<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Team Member</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">
            <div>
                <h1>Edit Team Member</h1>
                <p class="dashboard-subtitle">
                    Update resource profile, workload context, skills, certifications and training history.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/team" class="btn-primary">
                    Back to Team
                </a>
            </div>
        </div>

        <div class="form-container">

            <form method="POST">

                <label>Full Name</label>
                <input
                    type="text"
                    name="name"
                    value="{{ member['name'] }}"
                    required
                >

                <label>Role</label>
                <input
                    type="text"
                    name="role"
                    value="{{ member['role'] or '' }}"
                >

                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ member['email'] or '' }}"
                >

                <label>Phone</label>
                <input
                    type="text"
                    name="phone"
                    value="{{ member['phone'] or '' }}"
                >

                <label>Manager</label>
                <input
                    type="text"
                    name="manager"
                    value="{{ member['manager'] or '' }}"
                >

                <label>Department</label>
                <input
                    type="text"
                    name="department"
                    value="{{ member['department'] or '' }}"
                >

                <label>Employment Status</label>
                <select name="employment_status">
                    <option value="{{ member['employment_status'] or '' }}">
                        {{ member['employment_status'] or 'Select' }}
                    </option>
                    <option value="Permanent">Permanent</option>
                    <option value="Contractor">Contractor</option>
                    <option value="Part Time">Part Time</option>
                    <option value="Temporary">Temporary</option>
                </select>

                <label>Availability</label>
                <select name="availability">
                    <option value="{{ member['availability'] or '' }}">
                        {{ member['availability'] or 'Select' }}
                    </option>
                    <option value="Available">Available</option>
                    <option value="Partially Available">Partially Available</option>
                    <option value="Fully Allocated">Fully Allocated</option>
                    <option value="On Leave">On Leave</option>
                </select>

                <label>Status</label>
                <select name="status">
                    <option value="{{ member['status'] or 'Active' }}">
                        {{ member['status'] or 'Active' }}
                    </option>
                    <option value="Active">Active</option>
                    <option value="Unavailable">Unavailable</option>
                    <option value="Inactive">Inactive</option>
                </select>

                <label>Skills</label>
                <textarea name="skills" rows="4">{{ member['skills'] or '' }}</textarea>

                <label>Certifications</label>
                <textarea name="certifications" rows="4">{{ member['certifications'] or '' }}</textarea>

                <label>Training Records</label>
                <textarea name="training_records" rows="4">{{ member['training_records'] or '' }}</textarea>

                <label>Performance Notes</label>
                <textarea name="performance_notes" rows="4">{{ member['performance_notes'] or '' }}</textarea>

                <br><br>

                <button type="submit" class="btn-primary">
                    Update Team Member
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
