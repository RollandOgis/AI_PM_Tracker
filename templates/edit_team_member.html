<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Team Member</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">
     {% include "sidebar.html" %}


    <div class="main-content">

        <div class="form-container">

            <h1>Edit Team Member</h1>

            <form method="POST">

                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ member['name'] }}"
                    required
                >


                <label>Role</label>

                <input
                    type="text"
                    name="role"
                    value="{{ member['role'] }}"
                >


                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="{{ member['email'] }}"
                >


                <label>Phone</label>

                <input
                    type="text"
                    name="phone"
                    value="{{ member['phone'] }}"
                >


                <label>Skills</label>

                <textarea
                    name="skills"
                    rows="4"
                >{{ member['skills'] }}</textarea>


                <label>Status</label>

                <select name="status">

                    <option
                        value="Active"
                        {% if member['status'] == 'Active' %}
                            selected
                        {% endif %}
                    >
                        Active
                    </option>

                    <option
                        value="Unavailable"
                        {% if member['status'] == 'Unavailable' %}
                            selected
                        {% endif %}
                    >
                        Unavailable
                    </option>

                    <option
                        value="Inactive"
                        {% if member['status'] == 'Inactive' %}
                            selected
                        {% endif %}
                    >
                        Inactive
                    </option>

                </select>


                <button type="submit" class="btn-primary">
                    Update Team Member
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
