<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>AI PM</h2>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/calendar">Calendar</a>
        <a href="/insights">Insights</a>
        <a href="/report">Reports</a>
        <a href="/activity">Activity</a>
        <a href="/sprint-planner">Sprint Planner</a>
        <a href="/advanced-search">Search</a>
        <a href="/profile">Profile</a>
        <a href="/logout">Logout</a>

    </div>

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Task</h1>

            <form method="POST">

                <label>Task Title</label>

                <input
                    type="text"
                    name="title"
                    value="{{ task['title'] }}"
                    required
                >

                <label>Priority</label>

                <select name="priority">

                    <option
                        value="High"
                        {% if task['priority'] == 'High' %}selected{% endif %}
                    >
                        High
                    </option>

                    <option
                        value="Medium"
                        {% if task['priority'] == 'Medium' %}selected{% endif %}
                    >
                        Medium
                    </option>

                    <option
                        value="Low"
                        {% if task['priority'] == 'Low' %}selected{% endif %}
                    >
                        Low
                    </option>

                </select>

                <label>Status</label>

                <select name="status">

                    <option
                        value="Pending"
                        {% if task['status'] == 'Pending' %}selected{% endif %}
                    >
                        Pending
                    </option>

                    <option
                        value="In Progress"
                        {% if task['status'] == 'In Progress' %}selected{% endif %}
                    >
                        In Progress
                    </option>

                    <option
                        value="Completed"
                        {% if task['status'] == 'Completed' %}selected{% endif %}
                    >
                        Completed
                    </option>

                    <option
                        value="Blocked"
                        {% if task['status'] == 'Blocked' %}selected{% endif %}
                    >
                        Blocked
                    </option>

                </select>

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    value="{{ task['due_date'] }}"
                >

                <label>Assigned To</label>

                <input
                    type="text"
                    name="assigned_to"
                    value="{{ task['assigned_to'] }}"
                >

                <label>Attachment URL</label>

                <input
                    type="url"
                    name="attachment_url"
                    value="{{ task['attachment_url'] }}"
                >

                <label>Estimated Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="estimated_hours"
                    value="{{ task['estimated_hours'] }}"
                >

                <label>Actual Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="actual_hours"
                    value="{{ task['actual_hours'] }}"
                >

                <label>Hourly Rate (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="hourly_rate"
                    value="{{ task['hourly_rate'] }}"
                >

                <button
                    type="submit"
                    class="btn-primary"
                >
                    Update Task
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
