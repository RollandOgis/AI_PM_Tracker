<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Task</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}

                        <option
                            value="{{ project['id'] }}"
                            {% if task['project_id'] == project['id'] %}
                                selected
                            {% endif %}
                        >
                            {{ project['name'] }}
                        </option>

                    {% endfor %}

                </select>

                <label>Task Title</label>

                <input
                    type="text"
                    name="title"
                    value="{{ task['title'] }}"
                    required
                >

                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                >{{ task['description'] }}</textarea>

                <label>Assigned To</label>

                <input
                    type="text"
                    name="assigned_to"
                    value="{{ task['assigned_to'] }}"
                >

                <label>Team Members</label>

                <select name="team_member_ids" multiple>

                    {% for member in team_members %}

                        <option
                            value="{{ member['id'] }}"
                            {% if member['id'] in selected_member_ids %}
                                selected
                            {% endif %}
                        >
                            {{ member['name'] }}

                            {% if member['role'] %}
                                - {{ member['role'] }}
                            {% endif %}
                        </option>

                    {% endfor %}

                </select>

                <small>
                    Hold Ctrl on Windows or Command on Mac to select multiple team members.
                </small>

                <label>Task Dependencies</label>

                <select name="depends_on_task_ids" multiple>

                    {% for existing_task in existing_tasks %}

                        <option
                            value="{{ existing_task['id'] }}"
                            {% if existing_task['id'] in selected_dependency_ids %}
                                selected
                            {% endif %}
                        >
                            {{ existing_task['title'] }}
                            ({{ existing_task['project_name'] }})
                        </option>

                    {% endfor %}

                </select>

                <small>
                    Select tasks that must be completed before this task.
                </small>

                <label>Priority</label>

                <select name="priority">

                    <option value="Low"
                        {% if task['priority'] == 'Low' %}selected{% endif %}
                    >
                        Low
                    </option>

                    <option value="Medium"
                        {% if task['priority'] == 'Medium' %}selected{% endif %}
                    >
                        Medium
                    </option>

                    <option value="High"
                        {% if task['priority'] == 'High' %}selected{% endif %}
                    >
                        High
                    </option>

                </select>

                <label>Status</label>

                <select name="status">

                    <option value="Pending"
                        {% if task['status'] == 'Pending' %}selected{% endif %}
                    >
                        Pending
                    </option>

                    <option value="In Progress"
                        {% if task['status'] == 'In Progress' %}selected{% endif %}
                    >
                        In Progress
                    </option>

                    <option value="Completed"
                        {% if task['status'] == 'Completed' %}selected{% endif %}
                    >
                        Completed
                    </option>

                </select>

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    value="{{ task['due_date'] }}"
                >

                <label>Estimated Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="estimated_hours"
                    value="{{ task['estimated_hours'] }}"
                >

                <label>Actual Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="actual_hours"
                    value="{{ task['actual_hours'] }}"
                >

                <label>Hourly Rate (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="hourly_rate"
                    value="{{ task['hourly_rate'] }}"
                >

                <label>Attachment Name</label>

                <input
                    type="text"
                    name="attachment_name"
                    value="{{ task['attachment_name'] or '' }}"
                    placeholder="Requirements Document"
                >

                <label>Attachment URL</label>

                <input
                    type="text"
                    name="attachment_url"
                    value="{{ task['attachment_url'] or '' }}"
                    placeholder="https://..."
                >

                <label>Acceptance Criteria</label>

                <textarea
                    name="acceptance_criteria"
                    rows="4"
                >{{ task['acceptance_criteria'] or '' }}</textarea>

                <label>Checklist</label>

                <textarea
                    name="checklist"
                    rows="4"
                    placeholder="Example:
- Build API
- Complete Testing
- Obtain Approval"
                >{{ task['checklist'] or '' }}</textarea>

                <label>

                    <input
                        type="checkbox"
                        name="is_recurring"
                        {% if task['is_recurring'] %}
                            checked
                        {% endif %}
                    >

                    Recurring Task

                </label>

                <label>Recurring Frequency</label>

                <select name="recurring_frequency">

                    <option value=""
                        {% if not task['recurring_frequency'] %}selected{% endif %}
                    >
                        Not Recurring
                    </option>

                    <option value="Daily"
                        {% if task['recurring_frequency'] == 'Daily' %}selected{% endif %}
                    >
                        Daily
                    </option>

                    <option value="Weekly"
                        {% if task['recurring_frequency'] == 'Weekly' %}selected{% endif %}
                    >
                        Weekly
                    </option>

                    <option value="Monthly"
                        {% if task['recurring_frequency'] == 'Monthly' %}selected{% endif %}
                    >
                        Monthly
                    </option>

                    <option value="Quarterly"
                        {% if task['recurring_frequency'] == 'Quarterly' %}selected{% endif %}
                    >
                        Quarterly
                    </option>

                </select>

                <button type="submit" class="btn-primary">
                    Update Task
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
