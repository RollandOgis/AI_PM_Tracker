<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-layout">

   <div class="sidebar">

    <h2>AI PM</h2>

    <p>
        Logged in as:
        <strong>{{ session["username"] }}</strong>
    </p>

    <a href="/">Dashboard</a>

    <a href="/tasks">Tasks</a>

    <a href="/add-task">Add Task</a>

    <a href="/add-project">Add Project</a>

    <a href="/logout">Logout</a>

</div>

    <div class="main-content">

        <h1>Edit Task</h1>

        <form method="POST" class="project-card">

            <input
                type="text"
                name="title"
                value="{{ task[1] }}"
                required>

            <br><br>

            <label>Priority</label>

            <select name="priority" required>

                <option value="High"
                    {% if task[2] == "High" %}selected{% endif %}>
                    High
                </option>

                <option value="Medium"
                    {% if task[2] == "Medium" %}selected{% endif %}>
                    Medium
                </option>

                <option value="Low"
                    {% if task[2] == "Low" %}selected{% endif %}>
                    Low
                </option>

            </select>

            <br><br>

            <label>Status</label>

            <select name="status" required>

                <option value="In Progress"
                    {% if task[3] == "In Progress" %}selected{% endif %}>
                    In Progress
                </option>

                <option value="Completed"
                    {% if task[3] == "Completed" %}selected{% endif %}>
                    Completed
                </option>

                <option value="Pending"
                    {% if task[3] == "Pending" %}selected{% endif %}>
                    Pending
                </option>

                <option value="Blocked"
                    {% if task[3] == "Blocked" %}selected{% endif %}>
                    Blocked
                </option>

            </select>

            <br><br>

            <input
                type="date"
                name="due_date"
                value="{{ task[4] }}"
                required>

            <br><br>

            <button type="submit">
                Update Task
            </button>

        </form>

    </div>

</div>

</body>
</html>
