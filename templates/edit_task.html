<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h1>AI PM</h1>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/add-task">Add Task</a>
        <a href="/add-project">Add Project</a>
        <a href="/logout">Logout</a>

        <div class="user-box">
            Logged in as:
            <strong>{{ session.get("username", "User") }}</strong>
        </div>
    </div>

    <div class="main-content">

        <div class="form-card">

            <h2>Edit Task</h2>

            <form method="POST">

                <label>Task Title</label>
                <input type="text" name="title" value="{{ task['title'] }}" required>

                <label>Assigned To</label>
                <input type="text" name="assigned_to" value="{{ task['assigned_to'] or '' }}">

                <label>Priority</label>
                <select name="priority">
                    <option value="Low" {% if task['priority'] == "Low" %}selected{% endif %}>Low</option>
                    <option value="Medium" {% if task['priority'] == "Medium" %}selected{% endif %}>Medium</option>
                    <option value="High" {% if task['priority'] == "High" %}selected{% endif %}>High</option>
                </select>

                <label>Status</label>
                <select name="status">
                    <option value="Pending" {% if task['status'] == "Pending" %}selected{% endif %}>Pending</option>
                    <option value="In Progress" {% if task['status'] == "In Progress" %}selected{% endif %}>In Progress</option>
                    <option value="Completed" {% if task['status'] == "Completed" %}selected{% endif %}>Completed</option>
                    <option value="Blocked" {% if task['status'] == "Blocked" %}selected{% endif %}>Blocked</option>
                </select>

                <label>Due Date</label>
                <input type="date" name="due_date" value="{{ task['due_date'] }}">

                <button type="submit">Update Task</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
