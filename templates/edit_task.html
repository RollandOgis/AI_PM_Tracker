<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Task</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}

                        {% if task['project_id'] == project['id'] %}

                            <option value="{{ project['id'] }}" selected>
                                {{ project['name'] }}
                            </option>

                        {% else %}

                            <option value="{{ project['id'] }}">
                                {{ project['name'] }}
                            </option>

                        {% endif %}

                    {% endfor %}

                </select>


                <label>Task Title</label>

                <input
                    type="text"
                    name="title"
                    value="{{ task['title'] }}"
                    required
                >


                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                >{{ task['description'] }}</textarea>


                <label>Assigned To</label>

                <input
                    type="text"
                    name="assigned_to"
                    value="{{ task['assigned_to'] }}"
                >


                <label>Team Members</label>

                <select name="team_member_ids" multiple>

                    {% for member in team_members %}

                        {% if member['id'] in selected_member_ids %}

                            <option value="{{ member['id'] }}" selected>

                                {{ member['name'] }}

                                {% if member['role'] %}
                                    - {{ member['role'] }}
                                {% endif %}

                            </option>

                        {% else %}

                            <option value="{{ member['id'] }}">

                                {{ member['name'] }}

                                {% if member['role'] %}
                                    - {{ member['role'] }}
                                {% endif %}

                            </option>

                        {% endif %}

                    {% endfor %}

                </select>

                <small>
                    Hold Ctrl on Windows or Command on Mac to select multiple team members.
                </small>


                <br><br>


                <label>Task Dependencies</label>

                <select name="depends_on_task_ids" multiple>

                    {% for existing_task in existing_tasks %}

                        {% if existing_task['id'] in selected_dependency_ids %}

                            <option value="{{ existing_task['id'] }}" selected>
                                {{ existing_task['title'] }}
                                ({{ existing_task['project_name'] }})
                            </option>

                        {% else %}

                            <option value="{{ existing_task['id'] }}">
                                {{ existing_task['title'] }}
                                ({{ existing_task['project_name'] }})
                            </option>

                        {% endif %}

                    {% endfor %}

                </select>

                <small>
                    Select tasks that must be completed before this task.
                </small>


                <br><br>


                <label>Priority</label>

                <select name="priority">

                    {% if task['priority'] == 'Low' %}
                        <option value="Low" selected>Low</option>
                    {% else %}
                        <option value="Low">Low</option>
                    {% endif %}

                    {% if task['priority'] == 'Medium' %}
                        <option value="Medium" selected>Medium</option>
                    {% else %}
                        <option value="Medium">Medium</option>
                    {% endif %}

                    {% if task['priority'] == 'High' %}
                        <option value="High" selected>High</option>
                    {% else %}
                        <option value="High">High</option>
                    {% endif %}

                </select>


                <label>Status</label>

                <select name="status">

                    {% if task['status'] == 'Pending' %}
                        <option value="Pending" selected>Pending</option>
                    {% else %}
                        <option value="Pending">Pending</option>
                    {% endif %}

                    {% if task['status'] == 'In Progress' %}
                        <option value="In Progress" selected>In Progress</option>
                    {% else %}
                        <option value="In Progress">In Progress</option>
                    {% endif %}

                    {% if task['status'] == 'Completed' %}
                        <option value="Completed" selected>Completed</option>
                    {% else %}
                        <option value="Completed">Completed</option>
                    {% endif %}

                    {% if task['status'] == 'Blocked' %}
                        <option value="Blocked" selected>Blocked</option>
                    {% else %}
                        <option value="Blocked">Blocked</option>
                    {% endif %}

                </select>


                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    value="{{ task['due_date'] }}"
                >


                <label>Estimated Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="estimated_hours"
                    value="{{ task['estimated_hours'] }}"
                >


                <label>Actual Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="actual_hours"
                    value="{{ task['actual_hours'] }}"
                >


                <label>Hourly Rate (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="hourly_rate"
                    value="{{ task['hourly_rate'] }}"
                >


                <label>Attachment Name</label>

                <input
                    type="text"
                    name="attachment_name"
                    value="{{ task['attachment_name'] or '' }}"
                    placeholder="Requirements Document"
                >


               <label>Attachment URL</label>

<input
    type="text"
    name="attachment_url"
    value="{{ task['attachment_url'] or '' }}"
    placeholder="https://..."
>


<label>Acceptance Criteria</label>

<textarea
    name="acceptance_criteria"
    rows="4"
>{{ task['acceptance_criteria'] or '' }}</textarea>


<label>Checklist</label>

<textarea
    name="checklist"
    rows="4"
    placeholder="Build API, complete testing, obtain approval"
>{{ task['checklist'] or '' }}</textarea>


<div style="margin-top:15px;">
    <label style="display:flex; gap:10px; align-items:center;">

        {% if task['is_recurring'] %}

            <input
                type="checkbox"
                name="is_recurring"
                checked
            >

        {% else %}

            <input
                type="checkbox"
                name="is_recurring"
            >

        {% endif %}

        <span>Recurring Task</span>

    </label>
</div>


<label>Recurring Frequency</label>

                <select name="recurring_frequency">

                    {% if not task['recurring_frequency'] %}
                        <option value="" selected>Not Recurring</option>
                    {% else %}
                        <option value="">Not Recurring</option>
                    {% endif %}

                    {% if task['recurring_frequency'] == 'Daily' %}
                        <option value="Daily" selected>Daily</option>
                    {% else %}
                        <option value="Daily">Daily</option>
                    {% endif %}

                    {% if task['recurring_frequency'] == 'Weekly' %}
                        <option value="Weekly" selected>Weekly</option>
                    {% else %}
                        <option value="Weekly">Weekly</option>
                    {% endif %}

                    {% if task['recurring_frequency'] == 'Monthly' %}
                        <option value="Monthly" selected>Monthly</option>
                    {% else %}
                        <option value="Monthly">Monthly</option>
                    {% endif %}

                    {% if task['recurring_frequency'] == 'Quarterly' %}
                        <option value="Quarterly" selected>Quarterly</option>
                    {% else %}
                        <option value="Quarterly">Quarterly</option>
                    {% endif %}

                </select>


                <button type="submit" class="btn-primary">
                    Update Task
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
