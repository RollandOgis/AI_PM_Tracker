<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Issue</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include 'sidebar.html' %}

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Issue</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id">

                    {% for project in projects %}

                        {% if project['id'] == issue['project_id'] %}
                            <option value="{{ project['id'] }}" selected>
                                {{ project['name'] }}
                            </option>
                        {% else %}
                            <option value="{{ project['id'] }}">
                                {{ project['name'] }}
                            </option>
                        {% endif %}

                    {% endfor %}

                </select>


                <label>Issue Title</label>

                <input
                    type="text"
                    name="title"
                    value="{{ issue['title'] }}"
                    required
                >


                <label>Description</label>

                <textarea
                    name="description"
                    rows="4"
                    required
                >{{ issue['description'] }}</textarea>


                <label>Issue Category</label>

                <select name="issue_category">

                    <option value="Delivery"
                    {% if issue['issue_category'] == 'Delivery' %}selected{% endif %}>
                    Delivery
                    </option>

                    <option value="Technical"
                    {% if issue['issue_category'] == 'Technical' %}selected{% endif %}>
                    Technical
                    </option>

                    <option value="Financial"
                    {% if issue['issue_category'] == 'Financial' %}selected{% endif %}>
                    Financial
                    </option>

                    <option value="Supplier"
                    {% if issue['issue_category'] == 'Supplier' %}selected{% endif %}>
                    Supplier
                    </option>

                    <option value="Resource"
                    {% if issue['issue_category'] == 'Resource' %}selected{% endif %}>
                    Resource
                    </option>

                    <option value="Compliance"
                    {% if issue['issue_category'] == 'Compliance' %}selected{% endif %}>
                    Compliance
                    </option>

                </select>


                <label>Priority</label>

                <select name="priority">

                    <option value="Low"
                    {% if issue['priority'] == 'Low' %}selected{% endif %}>
                    Low
                    </option>

                    <option value="Medium"
                    {% if issue['priority'] == 'Medium' %}selected{% endif %}>
                    Medium
                    </option>

                    <option value="High"
                    {% if issue['priority'] == 'High' %}selected{% endif %}>
                    High
                    </option>

                </select>


                <label>Issue Owner</label>

                <input
                    type="text"
                    name="owner"
                    value="{{ issue['owner'] }}"
                    required
                >


                <label>SLA Target Date</label>

                <input
                    type="date"
                    name="sla_target_date"
                    value="{{ issue['sla_target_date'] or '' }}"
                >


                <label>Escalation Status</label>

                <select name="escalation_status">

                    <option value="Not Escalated"
                    {% if issue['escalation_status'] == 'Not Escalated' %}selected{% endif %}>
                    Not Escalated
                    </option>

                    <option value="Escalated"
                    {% if issue['escalation_status'] == 'Escalated' %}selected{% endif %}>
                    Escalated
                    </option>

                </select>


                <label>Escalation Owner</label>

                <input
                    type="text"
                    name="escalation_owner"
                    value="{{ issue['escalation_owner'] or '' }}"
                >


                <label>Escalation Date</label>

                <input
                    type="date"
                    name="escalation_date"
                    value="{{ issue['escalation_date'] or '' }}"
                >


                <label>Status</label>

                <select name="status">

                    <option value="Open"
                    {% if issue['status'] == 'Open' %}selected{% endif %}>
                    Open
                    </option>

                    <option value="Investigating"
                    {% if issue['status'] == 'Investigating' %}selected{% endif %}>
                    Investigating
                    </option>

                    <option value="Resolved"
                    {% if issue['status'] == 'Resolved' %}selected{% endif %}>
                    Resolved
                    </option>

                    <option value="Closed"
                    {% if issue['status'] == 'Closed' %}selected{% endif %}>
                    Closed
                    </option>

                </select>


                <label>Root Cause Analysis</label>

                <textarea
                    name="root_cause"
                    rows="4"
                >{{ issue['root_cause'] or '' }}</textarea>


                <label>Resolution Plan</label>

                <textarea
                    name="resolution"
                    rows="4"
                    required
                >{{ issue['resolution'] }}</textarea>


                <label>Closure Validation</label>

                <textarea
                    name="closure_validation"
                    rows="4"
                >{{ issue['closure_validation'] or '' }}</textarea>


                <button type="submit" class="btn-primary">
                    Update Issue
                </button>

            </form>

        </div>


        {% if issue_history %}

        <div class="smart-card">

            <h2>Issue History</h2>

            {% for history in issue_history %}

                <div class="smart-insight">

                    <strong>
                        {{ history['action'] }}
                    </strong>

                    <br>

                    Previous Status:
                    {{ history['previous_status'] }}

                    →

                    New Status:
                    {{ history['new_status'] }}

                    <br>

                    Date:
                    {{ history['created_at'] }}

                </div>

            {% endfor %}

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
