<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<div class="container">

    <div class="sidebar">

        <h1>AI PM</h1>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/calendar">Calendar</a>
        <a href="/insights">AI Insights</a>
        <a href="/export-tasks">Export CSV</a>
        <a href="/add-task">Add Task</a>
        <a href="/add-project">Add Project</a>
        <a href="/logout">Logout</a>

        <div class="user-box">
            Logged in as:
            <strong>{{ session.get("username", "User") }}</strong>
        </div>

    </div>

    <div class="main-content">

        <div class="form-card">

            <h2>Add New Project</h2>

            <form method="POST">

                <label>Project Name</label>

                <input
                    type="text"
                    name="name"
                    required
                >

                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                ></textarea>

                <label>Status</label>

                <select name="status">

                    <option value="Active">
                        Active
                    </option>

                    <option value="Planning">
                        Planning
                    </option>

                    <option value="In Progress">
                        In Progress
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                    <option value="On Hold">
                        On Hold
                    </option>

                </select>

                <label>Start Date</label>

                <input
                    type="date"
                    name="start_date"
                >

                <label>End Date</label>

                <input
                    type="date"
                    name="end_date"
                >

                <button type="submit">
                    Add Project
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
