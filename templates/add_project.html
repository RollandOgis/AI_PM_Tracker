<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>AI PM</h2>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/calendar">Calendar</a>
        <a href="/gantt">Gantt Timeline</a>
        <a href="/analytics">Analytics</a>

        <a href="/clients">Clients</a>
        <a href="/team">Team Members</a>

        <a href="/ai-assistant">AI Assistant</a>

        <a href="/risks">Risk Register</a>
        <a href="/issues">Issue Register</a>
        <a href="/changes">Change Register</a>
        <a href="/benefits">Benefits Register</a>

        <a href="/insights">Insights</a>
        <a href="/report">Reports</a>

        <a href="/activity">Activity</a>
        <a href="/advanced-search">Search</a>

        <a href="/add-task">Add Task</a>
        <a href="/add-project">Add Project</a>

        <a href="/profile">Profile</a>

        <a href="/logout">Logout</a>

    </div>


    <div class="main-content">

        <div class="form-container">

            <h1>Add Project</h1>

            <form method="POST">

                <label>Project Name</label>

                <input
                    type="text"
                    name="name"
                    required
                >


                <label>Client</label>

                <select name="client_id">

                    <option value="">
                        No Client
                    </option>

                    {% for client in clients %}

                        <option value="{{ client['id'] }}">

                            {{ client['name'] }}

                            {% if client['company'] %}
                                - {{ client['company'] }}
                            {% endif %}

                        </option>

                    {% endfor %}

                </select>


                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                    required
                ></textarea>


                <label>Status</label>

                <select name="status">

                    <option value="Planning">
                        Planning
                    </option>

                    <option value="In Progress">
                        In Progress
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                    <option value="On Hold">
                        On Hold
                    </option>

                </select>


                <label>Budget (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="budget"
                >


                <label>Deadline</label>

                <input
                    type="date"
                    name="deadline"
                >


                <button type="submit" class="btn-primary">
                    Create Project
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
