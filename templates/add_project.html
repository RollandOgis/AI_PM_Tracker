<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="form-container">

            <h1>Add Project</h1>

            <form method="POST">

                <label>Project Name</label>

                <input
                    type="text"
                    name="name"
                    required
                >

                <label>Client</label>

                <select name="client_id">

                    <option value="">
                        No Client
                    </option>

                    {% for client in clients %}

                        <option value="{{ client['id'] }}">

                            {{ client['name'] }}

                            {% if client['company'] %}
                                - {{ client['company'] }}
                            {% endif %}

                        </option>

                    {% endfor %}

                </select>

                <label>Project Sponsor</label>

                <select name="sponsor_id">

                    <option value="">
                        No Sponsor
                    </option>

                    {% for stakeholder in stakeholders %}

                        <option value="{{ stakeholder['id'] }}">

                            {{ stakeholder['name'] }}

                            {% if stakeholder['role'] %}
                                - {{ stakeholder['role'] }}
                            {% endif %}

                        </option>

                    {% endfor %}

                </select>

                <label>Project Manager</label>

                <select name="project_manager_id">

                    <option value="">
                        No Project Manager
                    </option>

                    {% for member in team_members %}

                        <option value="{{ member['id'] }}">

                            {{ member['name'] }}

                            {% if member['role'] %}
                                - {{ member['role'] }}
                            {% endif %}

                        </option>

                    {% endfor %}

                </select>

                <label>Project Type</label>

                <select name="project_type">

                    <option value="Software">
                        Software
                    </option>

                    <option value="Infrastructure">
                        Infrastructure
                    </option>

                    <option value="Business Change">
                        Business Change
                    </option>

                    <option value="Transformation">
                        Transformation
                    </option>

                    <option value="Compliance">
                        Compliance
                    </option>

                </select>

                <label>Programme</label>

                <input
                    type="text"
                    name="programme"
                    placeholder="Example: Digital Transformation Programme"
                >

                <label>Portfolio</label>

                <input
                    type="text"
                    name="portfolio"
                    placeholder="Example: Enterprise Change Portfolio"
                >

                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                    required
                ></textarea>

                <label>Status</label>

                <select name="status">

                    <option value="Planning">
                        Planning
                    </option>

                    <option value="In Progress">
                        In Progress
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                    <option value="On Hold">
                        On Hold
                    </option>

                </select>

                <label>Start Date</label>

                <input
                    type="date"
                    name="start_date"
                >

                <label>End Date</label>

                <input
                    type="date"
                    name="end_date"
                >

                <label>Estimated Budget (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="estimated_budget"
                >

                <label>Actual Cost (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="actual_cost"
                >

                <button type="submit" class="btn-primary">
                    Create Project
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
