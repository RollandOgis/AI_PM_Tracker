<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Approval Workflows</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-container">

    <div class="page-header">
        <h1>Approval Workflows</h1>
        <a href="/add-approval" class="btn-primary">+ New Approval</a>
    </div>

    <div class="card">

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Project</th>
                    <th>Type</th>
                    <th>Submitted By</th>
                    <th>Approver</th>
                    <th>Status</th>
                    <th>Submitted</th>
                    <th>Decision</th>
                </tr>
            </thead>

            <tbody>
                {% for approval in approvals %}
                <tr>
                    <td>{{ approval[0] }}</td>
                    <td>{{ approval[1] }}</td>
                    <td>{{ approval[2] }}</td>
                    <td>{{ approval[4] }}</td>
                    <td>{{ approval[5] }}</td>

                    <td>
                        <span class="status-badge">
                            {{ approval[6] }}
                        </span>
                    </td>

                    <td>{{ approval[7] }}</td>
                    <td>{{ approval[8] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
