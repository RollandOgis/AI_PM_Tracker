<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Approval</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include 'sidebar.html' %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Edit Approval</h1>

                <p class="dashboard-subtitle">
                    Update approval details, approver, status and comments.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/approvals" class="btn-primary">
                    Back to Approvals
                </a>
            </div>

        </div>

        <div class="smart-card">

            <form method="POST">

                <label>Project</label>
                <select name="project_id" required>
                    {% for project in projects %}
                        <option
                            value="{{ project['id'] }}"
                            {% if project['id'] == approval["project_id"] %}selected{% endif %}
                        >
                            {{ project['name'] }}
                        </option>
                    {% endfor %}
                </select>

                <label>Item Type</label>
                <input
                    type="text"
                    name="item_type"
                    value="{{ approval['item_type'] }}"
                    required
                >

                <label>Item ID</label>
                <input
                    type="number"
                    name="item_id"
                    value="{{ approval['item_id'] }}"
                    required
                >

                <label>Submitted By</label>
                <input
                    type="text"
                    name="submitted_by"
                    value="{{ approval['submitted_by'] }}"
                    required
                >

                <label>Approver</label>
                <input
                    type="text"
                    name="approver"
                    value="{{ approval['approver'] }}"
                    required
                >

                <label>Status</label>
                <select name="status" required>

                    <option value="Draft"
                        {% if approval["status"] == "Draft" %}selected{% endif %}
                    >
                        Draft
                    </option>

                    <option value="Submitted"
                        {% if approval["status"] == "Submitted" %}selected{% endif %}
                    >
                        Submitted
                    </option>

                    <option value="Pending Approval"
                        {% if approval["status"] == "Pending Approval" %}selected{% endif %}
                    >
                        Pending Approval
                    </option>

                    <option value="Approved"
                        {% if approval["status"] == "Approved" %}selected{% endif %}
                    >
                        Approved
                    </option>

                    <option value="Rejected"
                        {% if approval["status"] == "Rejected" %}selected{% endif %}
                    >
                        Rejected
                    </option>

                </select>

                <label>Comments</label>
                <textarea
                    name="comments"
                    rows="5"
                >{{ approval["comments"] }}</textarea>

                <br><br>

                <button type="submit" class="btn-primary">
                    Update Approval
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
