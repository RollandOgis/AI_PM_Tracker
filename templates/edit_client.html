<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Client</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Edit Client</h1>

                <p class="dashboard-subtitle">
                    Update client relationship, opportunity, contract and account ownership information.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/clients" class="btn-primary">
                    Back to Clients
                </a>
            </div>

        </div>

        <div class="form-container">

            <form method="POST">

                <label>Client Name</label>
                <input
                    type="text"
                    name="name"
                    value="{{ client['name'] }}"
                    required
                >

                <label>Company</label>
                <input
                    type="text"
                    name="company"
                    value="{{ client['company'] or '' }}"
                >

                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ client['email'] or '' }}"
                >

                <label>Phone</label>
                <input
                    type="text"
                    name="phone"
                    value="{{ client['phone'] or '' }}"
                >

                <label>Client Owner</label>
                <input
                    type="text"
                    name="client_owner"
                    value="{{ client['client_owner'] or '' }}"
                >

                <label>Account Manager</label>
                <input
                    type="text"
                    name="account_manager"
                    value="{{ client['account_manager'] or '' }}"
                >

                <label>Status</label>
                <select name="status">

                    <option value="Lead"
                        {% if client['status'] == 'Lead' %}selected{% endif %}>
                        Lead
                    </option>

                    <option value="Active"
                        {% if client['status'] == 'Active' %}selected{% endif %}>
                        Active
                    </option>

                    <option value="At Risk"
                        {% if client['status'] == 'At Risk' %}selected{% endif %}>
                        At Risk
                    </option>

                    <option value="Inactive"
                        {% if client['status'] == 'Inactive' %}selected{% endif %}>
                        Inactive
                    </option>

                    <option value="Won"
                        {% if client['status'] == 'Won' %}selected{% endif %}>
                        Won
                    </option>

                    <option value="Lost"
                        {% if client['status'] == 'Lost' %}selected{% endif %}>
                        Lost
                    </option>

                    <option value="Completed"
                        {% if client['status'] == 'Completed' %}selected{% endif %}>
                        Completed
                    </option>

                </select>

                <label>Opportunity Stage</label>
                <select name="opportunity_stage">

                    <option value="">Select</option>

                    <option value="Prospecting"
                        {% if client['opportunity_stage'] == 'Prospecting' %}selected{% endif %}>
                        Prospecting
                    </option>

                    <option value="Qualified"
                        {% if client['opportunity_stage'] == 'Qualified' %}selected{% endif %}>
                        Qualified
                    </option>

                    <option value="Proposal Sent"
                        {% if client['opportunity_stage'] == 'Proposal Sent' %}selected{% endif %}>
                        Proposal Sent
                    </option>

                    <option value="Negotiation"
                        {% if client['opportunity_stage'] == 'Negotiation' %}selected{% endif %}>
                        Negotiation
                    </option>

                    <option value="Won"
                        {% if client['opportunity_stage'] == 'Won' %}selected{% endif %}>
                        Won
                    </option>

                    <option value="Lost"
                        {% if client['opportunity_stage'] == 'Lost' %}selected{% endif %}>
                        Lost
                    </option>

                </select>

                <label>Estimated Value (£)</label>
                <input
                    type="number"
                    step="0.01"
                    name="estimated_value"
                    value="{{ client['estimated_value'] or 0 }}"
                >

                <label>Client Health Score</label>
                <input
                    type="number"
                    min="0"
                    max="100"
                    name="client_health_score"
                    value="{{ client['client_health_score'] or 70 }}"
                >

                <label>Client Risk Rating</label>
                <select name="client_risk_rating">

                    <option value="">Select</option>

                    <option value="Low"
                        {% if client['client_risk_rating'] == 'Low' %}selected{% endif %}>
                        Low
                    </option>

                    <option value="Medium"
                        {% if client['client_risk_rating'] == 'Medium' %}selected{% endif %}>
                        Medium
                    </option>

                    <option value="High"
                        {% if client['client_risk_rating'] == 'High' %}selected{% endif %}>
                        High
                    </option>

                </select>

                <label>Satisfaction Score</label>
                <input
                    type="number"
                    min="0"
                    max="100"
                    name="satisfaction_score"
                    value="{{ client['satisfaction_score'] or 0 }}"
                >

                <label>Renewal Date</label>
                <input
                    type="date"
                    name="renewal_date"
                    value="{{ client['renewal_date'] or '' }}"
                >

                <label>Contract Expiry Date</label>
                <input
                    type="date"
                    name="contract_expiry_date"
                    value="{{ client['contract_expiry_date'] or '' }}"
                >

                <label>Notes</label>
                <textarea
                    name="notes"
                    rows="5"
                >{{ client['notes'] or '' }}</textarea>

                <br><br>

                <button type="submit" class="btn-primary">
                    Update Client
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
