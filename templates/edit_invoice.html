<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Invoice</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <main class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Edit Invoice</h1>

                <p class="dashboard-subtitle">
                    Update invoice information, payment status and billing records.
                </p>
            </div>

            <div>
                <a href="/invoices" class="btn-primary">
                    Back to Invoices
                </a>
            </div>

        </div>

        <div class="form-container">

            <form method="POST">

                <label>Organisation</label>

                <select name="organisation_id" required>

                    {% for organisation in organisations %}

                    <option
                        value="{{ organisation['id'] }}"
                        {% if organisation['id'] == invoice['organisation_id'] %}
                        selected
                        {% endif %}
                    >
                        {{ organisation['organisation_name'] }}
                    </option>

                    {% endfor %}

                </select>

                <label>Invoice Number</label>

                <input
                    type="text"
                    name="invoice_number"
                    value="{{ invoice['invoice_number'] }}"
                    required
                >

                <label>Plan</label>

                <input
                    type="text"
                    name="plan"
                    value="{{ invoice['plan'] }}"
                >

                <label>Amount</label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    value="{{ invoice['amount'] }}"
                    required
                >

                <label>VAT Amount</label>

                <input
                    type="number"
                    step="0.01"
                    name="vat_amount"
                    value="{{ invoice['vat_amount'] or 0 }}"
                >

                <label>Currency</label>

                <input
                    type="text"
                    name="currency"
                    value="{{ invoice['currency'] or 'GBP' }}"
                >

                <label>Status</label>

                <input
                    type="text"
                    name="status"
                    value="{{ invoice['status'] }}"
                >

                <label>Invoice Date</label>

                <input
                    type="date"
                    name="invoice_date"
                    value="{{ invoice['invoice_date'] }}"
                >

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    value="{{ invoice['due_date'] }}"
                >

                <label>Payment Date</label>

                <input
                    type="date"
                    name="payment_date"
                    value="{{ invoice['payment_date'] }}"
                >

                <label>Payment Terms</label>

                <input
                    type="text"
                    name="payment_terms"
                    value="{{ invoice['payment_terms'] or '' }}"
                >

                <label>Stripe Reference</label>

                <input
                    type="text"
                    name="stripe_invoice_reference"
                    value="{{ invoice['stripe_invoice_reference'] or '' }}"
                >

                <label>Attachment URL</label>

                <input
                    type="text"
                    name="invoice_attachment_url"
                    value="{{ invoice['invoice_attachment_url'] or '' }}"
                >

                <label>Invoice Notes</label>

                <textarea
                    name="invoice_notes"
                    rows="5"
                >{{ invoice['invoice_notes'] or '' }}</textarea>

                <br><br>

                <button
                    type="submit"
                    class="btn-primary"
                >
                    Update Invoice
                </button>

            </form>

        </div>

    </main>

</div>

</body>
</html>
