<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Benefit</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">
     {% include 'sidebar.html' %}

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Benefit</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}

                        <option
                            value="{{ project['id'] }}"
                            {% if project['id'] == benefit['project_id'] %}
                                selected
                            {% endif %}
                        >
                            {{ project['name'] }}
                        </option>

                    {% endfor %}

                </select>


                <label>Benefit Title</label>

                <input
                    type="text"
                    name="title"
                    value="{{ benefit['title'] }}"
                    required
                >


                <label>Description</label>

                <textarea
                    name="description"
                    rows="4"
                    required
                >{{ benefit['description'] }}</textarea>


                <label>Expected Value</label>

                <input
                    type="text"
                    name="expected_value"
                    value="{{ benefit['expected_value'] }}"
                    required
                >


                <label>Measurement Method</label>

                <textarea
                    name="measurement_method"
                    rows="4"
                    required
                >{{ benefit['measurement_method'] }}</textarea>


                <label>Benefit Owner</label>

                <input
                    type="text"
                    name="owner"
                    value="{{ benefit['owner'] }}"
                    required
                >


                <label>Status</label>

                <select name="status" required>

                    <option
                        value="Planned"
                        {% if benefit['status'] == 'Planned' %}selected{% endif %}
                    >
                        Planned
                    </option>

                    <option
                        value="In Progress"
                        {% if benefit['status'] == 'In Progress' %}selected{% endif %}
                    >
                        In Progress
                    </option>

                    <option
                        value="Realised"
                        {% if benefit['status'] == 'Realised' %}selected{% endif %}
                    >
                        Realised
                    </option>

                    <option
                        value="At Risk"
                        {% if benefit['status'] == 'At Risk' %}selected{% endif %}
                    >
                        At Risk
                    </option>

                </select>


                <label>Target Date</label>

                <input
                    type="date"
                    name="target_date"
                    value="{{ benefit['target_date'] }}"
                >


                <button type="submit" class="btn-primary">
                    Update Benefit
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
