<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Benefit</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include 'sidebar.html' %}

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Benefit</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}

                        {% if project['id'] == benefit['project_id'] %}
                            <option value="{{ project['id'] }}" selected>
                                {{ project['name'] }}
                            </option>
                        {% else %}
                            <option value="{{ project['id'] }}">
                                {{ project['name'] }}
                            </option>
                        {% endif %}

                    {% endfor %}

                </select>

                <label>Benefit Title</label>

                <input
                    type="text"
                    name="title"
                    value="{{ benefit['title'] }}"
                    required
                >

                <label>Description</label>

                <textarea
                    name="description"
                    rows="4"
                    required
                >{{ benefit['description'] }}</textarea>

                <label>Benefit Type</label>

                <select name="benefit_type">

                    {% if benefit['benefit_type'] == 'Financial' %}
                        <option value="Financial" selected>Financial</option>
                    {% else %}
                        <option value="Financial">Financial</option>
                    {% endif %}

                    {% if benefit['benefit_type'] == 'Operational' %}
                        <option value="Operational" selected>Operational</option>
                    {% else %}
                        <option value="Operational">Operational</option>
                    {% endif %}

                    {% if benefit['benefit_type'] == 'Customer' %}
                        <option value="Customer" selected>Customer</option>
                    {% else %}
                        <option value="Customer">Customer</option>
                    {% endif %}

                    {% if benefit['benefit_type'] == 'Compliance' %}
                        <option value="Compliance" selected>Compliance</option>
                    {% else %}
                        <option value="Compliance">Compliance</option>
                    {% endif %}

                    {% if benefit['benefit_type'] == 'Strategic' %}
                        <option value="Strategic" selected>Strategic</option>
                    {% else %}
                        <option value="Strategic">Strategic</option>
                    {% endif %}

                </select>

                <label>Benefit Category</label>

                <select name="benefit_category">

                    {% if benefit['benefit_category'] == 'Revenue Growth' %}
                        <option value="Revenue Growth" selected>Revenue Growth</option>
                    {% else %}
                        <option value="Revenue Growth">Revenue Growth</option>
                    {% endif %}

                    {% if benefit['benefit_category'] == 'Cost Reduction' %}
                        <option value="Cost Reduction" selected>Cost Reduction</option>
                    {% else %}
                        <option value="Cost Reduction">Cost Reduction</option>
                    {% endif %}

                    {% if benefit['benefit_category'] == 'Efficiency' %}
                        <option value="Efficiency" selected>Efficiency</option>
                    {% else %}
                        <option value="Efficiency">Efficiency</option>
                    {% endif %}

                    {% if benefit['benefit_category'] == 'Customer Satisfaction' %}
                        <option value="Customer Satisfaction" selected>Customer Satisfaction</option>
                    {% else %}
                        <option value="Customer Satisfaction">Customer Satisfaction</option>
                    {% endif %}

                    {% if benefit['benefit_category'] == 'Compliance' %}
                        <option value="Compliance" selected>Compliance</option>
                    {% else %}
                        <option value="Compliance">Compliance</option>
                    {% endif %}

                    {% if benefit['benefit_category'] == 'Strategic Value' %}
                        <option value="Strategic Value" selected>Strategic Value</option>
                    {% else %}
                        <option value="Strategic Value">Strategic Value</option>
                    {% endif %}

                </select>

                <label>Expected Value (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="expected_value"
                    value="{{ benefit['expected_value'] or 0 }}"
                >

                <label>Actual Value (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="actual_value"
                    value="{{ benefit['actual_value'] or 0 }}"
                >

                <label>Forecast Value (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="forecast_value"
                    value="{{ benefit['forecast_value'] or 0 }}"
                >

                <label>Measurement Method</label>

                <textarea
                    name="measurement_method"
                    rows="4"
                >{{ benefit['measurement_method'] or '' }}</textarea>

                <label>Benefit Owner</label>

                <input
                    type="text"
                    name="owner"
                    value="{{ benefit['owner'] or '' }}"
                >

                <label>Status</label>

                <select name="status">

                    {% if benefit['status'] == 'Planned' %}
                        <option value="Planned" selected>Planned</option>
                    {% else %}
                        <option value="Planned">Planned</option>
                    {% endif %}

                    {% if benefit['status'] == 'In Progress' %}
                        <option value="In Progress" selected>In Progress</option>
                    {% else %}
                        <option value="In Progress">In Progress</option>
                    {% endif %}

                    {% if benefit['status'] == 'Realised' %}
                        <option value="Realised" selected>Realised</option>
                    {% else %}
                        <option value="Realised">Realised</option>
                    {% endif %}

                    {% if benefit['status'] == 'At Risk' %}
                        <option value="At Risk" selected>At Risk</option>
                    {% else %}
                        <option value="At Risk">At Risk</option>
                    {% endif %}

                </select>

                <label>Target Date</label>

                <input
                    type="date"
                    name="target_date"
                    value="{{ benefit['target_date'] or '' }}"
                >

                <label>Realised Date</label>

                <input
                    type="date"
                    name="realised_date"
                    value="{{ benefit['realised_date'] or '' }}"
                >

                <label>Review Date</label>

                <input
                    type="date"
                    name="review_date"
                    value="{{ benefit['review_date'] or '' }}"
                >

                <button type="submit" class="btn-primary">
                    Update Benefit
                </button>

            </form>

        </div>

        {% if benefit_history %}

            <div class="smart-card">

                <h2>Benefit History</h2>

                {% for history in benefit_history %}

                    <div class="smart-insight">

                        <strong>{{ history['action'] }}</strong>

                        <br>

                        Previous Status:
                        {{ history['previous_status'] }}

                        →

                        New Status:
                        {{ history['new_status'] }}

                        <br>

                        Date:
                        {{ history['created_at'] }}

                    </div>

                {% endfor %}

            </div>

        {% endif %}

    </div>

</div>

</body>
</html>
