<!DOCTYPE html>
<html>
<head>
    <title>Invoices</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">

    {% include "sidebar.html" %}

    <main class="main-content">

        <h1>Invoices</h1>

        <div class="card">

            <table>

                <thead>

                    <tr>
                        <th>Invoice Number</th>
                        <th>Organisation</th>
                        <th>Plan</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Invoice Date</th>
                    </tr>

                </thead>

                <tbody>

                    {% for invoice in invoices_list %}

                    <tr>

                        <td>
                            {{ invoice.invoice_number }}
                        </td>

                        <td>
                            {{ invoice.organisation_name }}
                        </td>

                        <td>
                            {{ invoice.plan }}
                        </td>

                        <td>
                            £{{ invoice.amount }}
                        </td>

                        <td>
                            {{ invoice.status }}
                        </td>

                        <td>
                            {{ invoice.invoice_date }}
                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </main>

</div>

</body>
</html>
