<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Benefit</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="form-container">

            <h1>Add Benefit</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}

                        <option value="{{ project['id'] }}">
                            {{ project['name'] }}
                        </option>

                    {% endfor %}

                </select>


                <label>Benefit Title</label>

                <input
                    type="text"
                    name="title"
                    required
                >


                <label>Description</label>

                <textarea
                    name="description"
                    rows="4"
                    required
                ></textarea>


                <label>Benefit Type</label>

                <select name="benefit_type" required>

                    <option value="Financial">
                        Financial
                    </option>

                    <option value="Operational">
                        Operational
                    </option>

                    <option value="Customer">
                        Customer
                    </option>

                    <option value="Compliance">
                        Compliance
                    </option>

                    <option value="Strategic">
                        Strategic
                    </option>

                </select>


                <label>Benefit Category</label>

                <select name="benefit_category">

                    <option value="Revenue Growth">
                        Revenue Growth
                    </option>

                    <option value="Cost Reduction">
                        Cost Reduction
                    </option>

                    <option value="Efficiency">
                        Efficiency
                    </option>

                    <option value="Customer Satisfaction">
                        Customer Satisfaction
                    </option>

                    <option value="Compliance">
                        Compliance
                    </option>

                    <option value="Strategic Value">
                        Strategic Value
                    </option>

                </select>


                <label>Expected Value (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="expected_value"
                    value="0"
                >


                <label>Actual Value (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="actual_value"
                    value="0"
                >


                <label>Forecast Value (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="forecast_value"
                    value="0"
                >


                <label>Measurement Method</label>

                <textarea
                    name="measurement_method"
                    rows="4"
                    placeholder="How will this benefit be measured?"
                ></textarea>


                <label>Benefit Owner</label>

                <input
                    type="text"
                    name="owner"
                >


                <label>Status</label>

                <select name="status">

                    <option value="Planned">
                        Planned
                    </option>

                    <option value="In Progress">
                        In Progress
                    </option>

                    <option value="Realised">
                        Realised
                    </option>

                    <option value="At Risk">
                        At Risk
                    </option>

                </select>


                <label>Target Date</label>

                <input
                    type="date"
                    name="target_date"
                >


                <label>Realised Date</label>

                <input
                    type="date"
                    name="realised_date"
                >


                <label>Review Date</label>

                <input
                    type="date"
                    name="review_date"
                >


                <button
                    type="submit"
                    class="btn-primary"
                >
                    Save Benefit
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
