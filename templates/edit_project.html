<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>AI PM</h2>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/calendar">Calendar</a>
        <a href="/gantt">Gantt Timeline</a>
        <a href="/analytics">Analytics</a>

        <a href="/clients">Clients</a>
        <a href="/team">Team Members</a>

        <a href="/ai-assistant">AI Assistant</a>

        <a href="/risks">Risk Register</a>
        <a href="/issues">Issue Register</a>
        <a href="/changes">Change Register</a>
        <a href="/benefits">Benefits Register</a>

        <a href="/insights">Insights</a>
        <a href="/report">Reports</a>

        <a href="/activity">Activity</a>
        <a href="/advanced-search">Search</a>

        <a href="/add-task">Add Task</a>
        <a href="/add-project">Add Project</a>

        <a href="/profile">Profile</a>

        <a href="/logout">Logout</a>

    </div>


    <div class="main-content">

        <div class="form-container">

            <h1>Edit Project</h1>

            <form method="POST">

                <label>Project Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ project['name'] }}"
                    required
                >


                <label>Client</label>

                <select name="client_id">

                    <option value="">
                        No Client
                    </option>

                    {% for client in clients %}

                        {% if project['client_id'] == client['id'] %}

                            <option value="{{ client['id'] }}" selected>

                                {{ client['name'] }}

                                {% if client['company'] %}
                                    - {{ client['company'] }}
                                {% endif %}

                            </option>

                        {% else %}

                            <option value="{{ client['id'] }}">

                                {{ client['name'] }}

                                {% if client['company'] %}
                                    - {{ client['company'] }}
                                {% endif %}

                            </option>

                        {% endif %}

                    {% endfor %}

                </select>


                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                    required
                >{{ project['description'] }}</textarea>


                <label>Status</label>

                <select name="status">

                    {% if project['status'] == 'Planning' %}
                        <option value="Planning" selected>Planning</option>
                    {% else %}
                        <option value="Planning">Planning</option>
                    {% endif %}

                    {% if project['status'] == 'In Progress' %}
                        <option value="In Progress" selected>In Progress</option>
                    {% else %}
                        <option value="In Progress">In Progress</option>
                    {% endif %}

                    {% if project['status'] == 'Completed' %}
                        <option value="Completed" selected>Completed</option>
                    {% else %}
                        <option value="Completed">Completed</option>
                    {% endif %}

                    {% if project['status'] == 'On Hold' %}
                        <option value="On Hold" selected>On Hold</option>
                    {% else %}
                        <option value="On Hold">On Hold</option>
                    {% endif %}

                </select>


                <label>Start Date</label>

                <input
                    type="date"
                    name="start_date"
                    value="{{ project['start_date'] }}"
                >


                <label>End Date</label>

                <input
                    type="date"
                    name="end_date"
                    value="{{ project['end_date'] }}"
                >


                <label>Estimated Budget (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="estimated_budget"
                    value="{{ project['estimated_budget'] }}"
                >


                <label>Actual Cost (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="actual_cost"
                    value="{{ project['actual_cost'] }}"
                >


                <button type="submit" class="btn-primary">
                    Update Project
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
