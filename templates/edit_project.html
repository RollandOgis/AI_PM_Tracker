<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Project</h1>

            <form method="POST">

                <label>Project Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ project['name'] }}"
                    required
                >

                <label>Client</label>

                <select name="client_id">

                    <option value="">
                        No Client
                    </option>

                    {% for client in clients %}

                        {% if project['client_id'] == client['id'] %}

                            <option value="{{ client['id'] }}" selected>

                                {{ client['name'] }}

                                {% if client['company'] %}
                                    - {{ client['company'] }}
                                {% endif %}

                            </option>

                        {% else %}

                            <option value="{{ client['id'] }}">

                                {{ client['name'] }}

                                {% if client['company'] %}
                                    - {{ client['company'] }}
                                {% endif %}

                            </option>

                        {% endif %}

                    {% endfor %}

                </select>


                <label>Project Sponsor</label>

                <select name="sponsor_id">

                    <option value="">
                        No Sponsor
                    </option>

                    {% for stakeholder in stakeholders %}

                        <option
                            value="{{ stakeholder['id'] }}"
                            {% if project['sponsor_id'] == stakeholder['id'] %}
                                selected
                            {% endif %}
                        >

                            {{ stakeholder['name'] }}

                            {% if stakeholder['role'] %}
                                - {{ stakeholder['role'] }}
                            {% endif %}

                        </option>

                    {% endfor %}

                </select>


                <label>Project Manager</label>

                <select name="project_manager_id">

                    <option value="">
                        No Project Manager
                    </option>

                    {% for member in team_members %}

                        <option
                            value="{{ member['id'] }}"
                            {% if project['project_manager_id'] == member['id'] %}
                                selected
                            {% endif %}
                        >

                            {{ member['name'] }}

                            {% if member['role'] %}
                                - {{ member['role'] }}
                            {% endif %}

                        </option>

                    {% endfor %}

                </select>


                <label>Project Type</label>

                <select name="project_type">

                    <option value="Software"
                        {% if project['project_type'] == 'Software' %}selected{% endif %}
                    >
                        Software
                    </option>

                    <option value="Infrastructure"
                        {% if project['project_type'] == 'Infrastructure' %}selected{% endif %}
                    >
                        Infrastructure
                    </option>

                    <option value="Business Change"
                        {% if project['project_type'] == 'Business Change' %}selected{% endif %}
                    >
                        Business Change
                    </option>

                    <option value="Transformation"
                        {% if project['project_type'] == 'Transformation' %}selected{% endif %}
                    >
                        Transformation
                    </option>

                    <option value="Compliance"
                        {% if project['project_type'] == 'Compliance' %}selected{% endif %}
                    >
                        Compliance
                    </option>

                </select>


                <label>Programme</label>

                <input
                    type="text"
                    name="programme"
                    value="{{ project['programme'] or '' }}"
                >


                <label>Portfolio</label>

                <input
                    type="text"
                    name="portfolio"
                    value="{{ project['portfolio'] or '' }}"
                >


                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                    required
                >{{ project['description'] }}</textarea>


                <label>Status</label>

                <select name="status">

                    {% if project['status'] == 'Planning' %}
                        <option value="Planning" selected>Planning</option>
                    {% else %}
                        <option value="Planning">Planning</option>
                    {% endif %}

                    {% if project['status'] == 'In Progress' %}
                        <option value="In Progress" selected>In Progress</option>
                    {% else %}
                        <option value="In Progress">In Progress</option>
                    {% endif %}

                    {% if project['status'] == 'Completed' %}
                        <option value="Completed" selected>Completed</option>
                    {% else %}
                        <option value="Completed">Completed</option>
                    {% endif %}

                    {% if project['status'] == 'On Hold' %}
                        <option value="On Hold" selected>On Hold</option>
                    {% else %}
                        <option value="On Hold">On Hold</option>
                    {% endif %}

                </select>


                <label>Start Date</label>

                <input
                    type="date"
                    name="start_date"
                    value="{{ project['start_date'] }}"
                >


                <label>End Date</label>

                <input
                    type="date"
                    name="end_date"
                    value="{{ project['end_date'] }}"
                >


                <label>Estimated Budget (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="estimated_budget"
                    value="{{ project['estimated_budget'] }}"
                >


                <label>Actual Cost (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="actual_cost"
                    value="{{ project['actual_cost'] }}"
                >


                <button type="submit" class="btn-primary">
                    Update Project
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
