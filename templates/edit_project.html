<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Project</h1>

            <form method="POST">

                <label>Project Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ project['name'] }}"
                    required
                >

                <label>Client</label>

                <select name="client_id">

                    <option value="">
                        No Client
                    </option>

                    {% for client in clients %}

                        {% if project['client_id'] == client['id'] %}

                            <option value="{{ client['id'] }}" selected>
                                {{ client['name'] }}
                                {% if client['company'] %}
                                    - {{ client['company'] }}
                                {% endif %}
                            </option>

                        {% else %}

                            <option value="{{ client['id'] }}">
                                {{ client['name'] }}
                                {% if client['company'] %}
                                    - {{ client['company'] }}
                                {% endif %}
                            </option>

                        {% endif %}

                    {% endfor %}

                </select>


                <label>Project Sponsor</label>

                <select name="sponsor_id">

                    <option value="">
                        No Sponsor
                    </option>

                    {% for stakeholder in stakeholders %}

                        {% if project['sponsor_id'] == stakeholder['id'] %}

                            <option value="{{ stakeholder['id'] }}" selected>
                                {{ stakeholder['name'] }}
                                {% if stakeholder['role'] %}
                                    - {{ stakeholder['role'] }}
                                {% endif %}
                            </option>

                        {% else %}

                            <option value="{{ stakeholder['id'] }}">
                                {{ stakeholder['name'] }}
                                {% if stakeholder['role'] %}
                                    - {{ stakeholder['role'] }}
                                {% endif %}
                            </option>

                        {% endif %}

                    {% endfor %}

                </select>


                <label>Project Manager</label>

                <select name="project_manager_id">

                    <option value="">
                        No Project Manager
                    </option>

                    {% for member in team_members %}

                        {% if project['project_manager_id'] == member['id'] %}

                            <option value="{{ member['id'] }}" selected>
                                {{ member['name'] }}
                                {% if member['role'] %}
                                    - {{ member['role'] }}
                                {% endif %}
                            </option>

                        {% else %}

                            <option value="{{ member['id'] }}">
                                {{ member['name'] }}
                                {% if member['role'] %}
                                    - {{ member['role'] }}
                                {% endif %}
                            </option>

                        {% endif %}

                    {% endfor %}

                </select>


                <label>Project Type</label>

                <select name="project_type">

                    {% if project['project_type'] == 'Software' %}
                        <option value="Software" selected>Software</option>
                    {% else %}
                        <option value="Software">Software</option>
                    {% endif %}

                    {% if project['project_type'] == 'Infrastructure' %}
                        <option value="Infrastructure" selected>Infrastructure</option>
                    {% else %}
                        <option value="Infrastructure">Infrastructure</option>
                    {% endif %}

                    {% if project['project_type'] == 'Business Change' %}
                        <option value="Business Change" selected>Business Change</option>
                    {% else %}
                        <option value="Business Change">Business Change</option>
                    {% endif %}

                    {% if project['project_type'] == 'Transformation' %}
                        <option value="Transformation" selected>Transformation</option>
                    {% else %}
                        <option value="Transformation">Transformation</option>
                    {% endif %}

                    {% if project['project_type'] == 'Compliance' %}
                        <option value="Compliance" selected>Compliance</option>
                    {% else %}
                        <option value="Compliance">Compliance</option>
                    {% endif %}

                </select>


                <label>Project Priority</label>

                <select name="project_priority">

                    {% if project['project_priority'] == 'Low' %}
                        <option value="Low" selected>Low</option>
                    {% else %}
                        <option value="Low">Low</option>
                    {% endif %}

                    {% if project['project_priority'] == 'Medium' %}
                        <option value="Medium" selected>Medium</option>
                    {% else %}
                        <option value="Medium">Medium</option>
                    {% endif %}

                    {% if project['project_priority'] == 'High' %}
                        <option value="High" selected>High</option>
                    {% else %}
                        <option value="High">High</option>
                    {% endif %}

                    {% if project['project_priority'] == 'Critical' %}
                        <option value="Critical" selected>Critical</option>
                    {% else %}
                        <option value="Critical">Critical</option>
                    {% endif %}

                </select>


                <label>Risk Rating</label>

                <select name="risk_rating">

                    {% if project['risk_rating'] == 'Low' %}
                        <option value="Low" selected>Low</option>
                    {% else %}
                        <option value="Low">Low</option>
                    {% endif %}

                    {% if project['risk_rating'] == 'Medium' %}
                        <option value="Medium" selected>Medium</option>
                    {% else %}
                        <option value="Medium">Medium</option>
                    {% endif %}

                    {% if project['risk_rating'] == 'High' %}
                        <option value="High" selected>High</option>
                    {% else %}
                        <option value="High">High</option>
                    {% endif %}

                    {% if project['risk_rating'] == 'Critical' %}
                        <option value="Critical" selected>Critical</option>
                    {% else %}
                        <option value="Critical">Critical</option>
                    {% endif %}

                </select>


                <label>Governance Category</label>

                <select name="governance_category">

                    {% if project['governance_category'] == 'Standard' %}
                        <option value="Standard" selected>Standard</option>
                    {% else %}
                        <option value="Standard">Standard</option>
                    {% endif %}

                    {% if project['governance_category'] == 'High Governance' %}
                        <option value="High Governance" selected>High Governance</option>
                    {% else %}
                        <option value="High Governance">High Governance</option>
                    {% endif %}

                    {% if project['governance_category'] == 'Regulatory' %}
                        <option value="Regulatory" selected>Regulatory</option>
                    {% else %}
                        <option value="Regulatory">Regulatory</option>
                    {% endif %}

                    {% if project['governance_category'] == 'Strategic' %}
                        <option value="Strategic" selected>Strategic</option>
                    {% else %}
                        <option value="Strategic">Strategic</option>
                    {% endif %}

                    {% if project['governance_category'] == 'Transformation' %}
                        <option value="Transformation" selected>Transformation</option>
                    {% else %}
                        <option value="Transformation">Transformation</option>
                    {% endif %}

                </select>


                <label>Programme</label>

                <input
                    type="text"
                    name="programme"
                    value="{{ project['programme'] or '' }}"
                >


                <label>Portfolio</label>

                <input
                    type="text"
                    name="portfolio"
                    value="{{ project['portfolio'] or '' }}"
                >


                <label>Business Case</label>

                <textarea
                    name="business_case"
                    rows="5"
                >{{ project['business_case'] or '' }}</textarea>


                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                    required
                >{{ project['description'] }}</textarea>


                <label>Status</label>

                <select name="status">

                    {% if project['status'] == 'Planning' %}
                        <option value="Planning" selected>Planning</option>
                    {% else %}
                        <option value="Planning">Planning</option>
                    {% endif %}

                    {% if project['status'] == 'In Progress' %}
                        <option value="In Progress" selected>In Progress</option>
                    {% else %}
                        <option value="In Progress">In Progress</option>
                    {% endif %}

                    {% if project['status'] == 'Completed' %}
                        <option value="Completed" selected>Completed</option>
                    {% else %}
                        <option value="Completed">Completed</option>
                    {% endif %}

                    {% if project['status'] == 'On Hold' %}
                        <option value="On Hold" selected>On Hold</option>
                    {% else %}
                        <option value="On Hold">On Hold</option>
                    {% endif %}

                </select>


                <label>Start Date</label>

                <input
                    type="date"
                    name="start_date"
                    value="{{ project['start_date'] }}"
                >


                <label>End Date</label>

                <input
                    type="date"
                    name="end_date"
                    value="{{ project['end_date'] }}"
                >


                <label>Estimated Budget (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="estimated_budget"
                    value="{{ project['estimated_budget'] }}"
                >


                <label>Actual Cost (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="actual_cost"
                    value="{{ project['actual_cost'] }}"
                >


                <button type="submit" class="btn-primary">
                    Update Project
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
