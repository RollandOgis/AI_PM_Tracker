<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>AI PM</h2>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/calendar">Calendar</a>
        <a href="/clients">Clients</a>
        <a href="/insights">Insights</a>
        <a href="/report">Reports</a>
        <a href="/activity">Activity</a>
        <a href="/sprint-planner">Sprint Planner</a>
        <a href="/advanced-search">Search</a>
        <a href="/profile">Profile</a>
        <a href="/logout">Logout</a>

    </div>

    <div class="main-content">

        <div class="form-container">

            <h1>Edit Project</h1>

            <form method="POST">

                <label>Project Name</label>
                <input
                    type="text"
                    name="name"
                    value="{{ project['name'] or '' }}"
                    required
                >

                <label>Client</label>
                <select name="client_id">
                    <option value="">No Client</option>

                    {% for client in clients %}
                        <option
                            value="{{ client['id'] }}"
                            {% if project['client_id'] == client['id'] %}selected{% endif %}
                        >
                            {{ client['name'] }}{% if client['company'] %} - {{ client['company'] }}{% endif %}
                        </option>
                    {% endfor %}
                </select>

                <label>Description</label>
                <textarea name="description" rows="5">{{ project['description'] or '' }}</textarea>

                <label>Status</label>
                <select name="status">
                    <option value="Planning" {% if project['status'] == 'Planning' %}selected{% endif %}>Planning</option>
                    <option value="In Progress" {% if project['status'] == 'In Progress' %}selected{% endif %}>In Progress</option>
                    <option value="Completed" {% if project['status'] == 'Completed' %}selected{% endif %}>Completed</option>
                    <option value="Blocked" {% if project['status'] == 'Blocked' %}selected{% endif %}>Blocked</option>
                </select>

                <label>Start Date</label>
                <input
                    type="date"
                    name="start_date"
                    value="{{ project['start_date'] or '' }}"
                >

                <label>End Date</label>
                <input
                    type="date"
                    name="end_date"
                    value="{{ project['end_date'] or '' }}"
                >

                <label>Estimated Budget (£)</label>
                <input
                    type="number"
                    step="0.01"
                    name="estimated_budget"
                    value="{{ project['estimated_budget'] or 0 }}"
                >

                <label>Actual Cost (£)</label>
                <input
                    type="number"
                    step="0.01"
                    name="actual_cost"
                    value="{{ project['actual_cost'] or 0 }}"
                >

                <button type="submit" class="btn-primary">
                    Update Project
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
