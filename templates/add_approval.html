<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Approval</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Add Approval</h1>

    <form method="POST">

        <label>Project</label>
        <select name="project_id" required>
            {% for project in projects %}
                <option value="{{ project[0] }}">{{ project[1] }}</option>
            {% endfor %}
        </select>

        <br><br>

        <label>Item Type</label>
        <input type="text" name="item_type" placeholder="Risk, Change, Budget, Stage Gate" required>

        <br><br>

        <label>Item ID</label>
        <input type="number" name="item_id" placeholder="Enter related item ID" required>

        <br><br>

        <label>Submitted By</label>
        <input type="text" name="submitted_by" required>

        <br><br>

        <label>Approver</label>
        <input type="text" name="approver" required>

        <br><br>

        <label>Status</label>
        <select name="status" required>
            <option value="Draft">Draft</option>
            <option value="Submitted">Submitted</option>
            <option value="Pending Approval">Pending Approval</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
        </select>

        <br><br>

        <label>Comments</label>
        <textarea name="comments" rows="5"></textarea>

        <br><br>

        <button type="submit">Save Approval</button>

    </form>

    <br>

    <a href="/approvals">Back to Approvals</a>

</div>

</body>
</html>
