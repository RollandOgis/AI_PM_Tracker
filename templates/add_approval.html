<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Approval</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include 'sidebar.html' %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Create Approval</h1>

                <p class="dashboard-subtitle">
                    Submit a governance item for review, approval or rejection.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/approvals" class="btn-primary">
                    Back to Approvals
                </a>
            </div>

        </div>

        <div class="smart-card">

            <form method="POST">

                <label>Project</label>
                <select name="project_id" required>
                    {% for project in projects %}
                        <option value="{{ project[0] }}">
                            {{ project[1] }}
                        </option>
                    {% endfor %}
                </select>

                <label>Item Type</label>
                <input
                    type="text"
                    name="item_type"
                    placeholder="Risk, Change, Budget, Stage Gate"
                    required
                >

                <label>Item ID</label>
                <input
                    type="number"
                    name="item_id"
                    placeholder="Enter related item ID"
                    required
                >

                <label>Submitted By</label>
                <input
                    type="text"
                    name="submitted_by"
                    required
                >

                <label>Approver</label>
                <input
                    type="text"
                    name="approver"
                    required
                >

                <label>Status</label>
                <select name="status" required>
                    <option value="Draft">Draft</option>
                    <option value="Submitted">Submitted</option>
                    <option value="Pending Approval">Pending Approval</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>

                <label>Comments</label>
                <textarea
                    name="comments"
                    rows="5"
                    placeholder="Add approval notes or decision comments"
                ></textarea>

                <br><br>

                <button type="submit" class="btn-primary">
                    Save Approval
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
