<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Approval</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-container">

    <div class="page-header">
        <h1>Create Approval</h1>
        <a href="/approvals" class="btn-primary">
            Back to Approvals
        </a>
    </div>

    <div class="card">

        <form method="POST">

            <div class="form-group">
                <label>Project</label>

                <select name="project_id" class="form-control" required>
                    {% for project in projects %}
                        <option value="{{ project[0] }}">
                            {{ project[1] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Item Type</label>

                <input
                    type="text"
                    name="item_type"
                    class="form-control"
                    placeholder="Risk, Change, Budget, Stage Gate"
                    required
                >
            </div>

            <div class="form-group">
                <label>Item ID</label>

                <input
                    type="number"
                    name="item_id"
                    class="form-control"
                    required
                >
            </div>

            <div class="form-group">
                <label>Submitted By</label>

                <input
                    type="text"
                    name="submitted_by"
                    class="form-control"
                    required
                >
            </div>

            <div class="form-group">
                <label>Approver</label>

                <input
                    type="text"
                    name="approver"
                    class="form-control"
                    required
                >
            </div>

            <div class="form-group">
                <label>Status</label>

                <select
                    name="status"
                    class="form-control"
                    required
                >
                    <option value="Draft">Draft</option>
                    <option value="Submitted">Submitted</option>
                    <option value="Pending Approval">Pending Approval</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>

            <div class="form-group">
                <label>Comments</label>

                <textarea
                    name="comments"
                    rows="5"
                    class="form-control"
                ></textarea>
            </div>

            <button
                type="submit"
                class="btn-primary"
            >
                Save Approval
            </button>

        </form>

    </div>

</div>

</body>
</html>
