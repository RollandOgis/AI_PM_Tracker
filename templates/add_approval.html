{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Create Approval</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Project</label>

            <select name="project_id" class="form-control">

                {% for project in projects %}
                    <option value="{{ project[0] }}">
                        {{ project[1] }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <div class="mb-3">
            <label>Item Type</label>
            <input
                type="text"
                name="item_type"
                class="form-control"
                placeholder="Change Request, Risk, Budget..."
                required
            >
        </div>

        <div class="mb-3">
            <label>Item ID</label>
            <input
                type="number"
                name="item_id"
                class="form-control"
                required
            >
        </div>

        <div class="mb-3">
            <label>Submitted By</label>
            <input
                type="text"
                name="submitted_by"
                class="form-control"
                required
            >
        </div>

        <div class="mb-3">
            <label>Approver</label>
            <input
                type="text"
                name="approver"
                class="form-control"
                required
            >
        </div>

        <div class="mb-3">
            <label>Status</label>

            <select name="status" class="form-control">
                <option value="Draft">Draft</option>
                <option value="Submitted">Submitted</option>
                <option value="Pending Approval">Pending Approval</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>

        </div>

        <div class="mb-3">
            <label>Comments</label>

            <textarea
                name="comments"
                class="form-control"
                rows="4">
            </textarea>
        </div>

        <button
            type="submit"
            class="btn btn-success">

            Save Approval

        </button>

    </form>

</div>

{% endblock %}
