<!DOCTYPE html>
<html>
<head>

    <title>AI Schedule Forecasting</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>
<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <h1>AI Schedule Forecasting</h1>

        <div class="card">

            <h2>Schedule Forecasts</h2>

            <table>

                <tr>
                    <th>Project</th>
                    <th>Completion %</th>
                    <th>Forecast</th>
                </tr>

                {% for project in forecasts %}

                <tr>

                    <td>{{ project.project_name }}</td>

                    <td>{{ project.completion_rate }}%</td>

                    <td>{{ project.forecast }}</td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</div>

</body>
</html>
