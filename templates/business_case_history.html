<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Case History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

{% include "sidebar.html" %}

<div class="main-content">

    <h1>Business Case History</h1>

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Action</th>
                    <th>Previous Status</th>
                    <th>New Status</th>
                    <th>Date</th>

                </tr>

            </thead>

            <tbody>

                {% for item in history %}

                <tr>

                    <td>{{ item["action"] }}</td>
                    <td>{{ item["previous_status"] }}</td>
                    <td>{{ item["new_status"] }}</td>
                    <td>{{ item["created_at"] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</div>

</body>
</html>
