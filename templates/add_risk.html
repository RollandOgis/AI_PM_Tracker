<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Risk</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include 'sidebar.html' %}

    <div class="main-content">

        <div class="form-container">

            <h1>Add Risk</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}

                        <option value="{{ project['id'] }}">
                            {{ project['name'] }}
                        </option>

                    {% endfor %}

                </select>


                <label>Risk Title</label>

                <input
                    type="text"
                    name="title"
                    required
                >


                <label>Description</label>

                <textarea
                    name="description"
                    rows="4"
                    required
                ></textarea>


                <label>Risk Category</label>

                <select name="risk_category">

                    <option value="Delivery">Delivery</option>
                    <option value="Schedule">Schedule</option>
                    <option value="Financial">Financial</option>
                    <option value="Technical">Technical</option>
                    <option value="Resource">Resource</option>
                    <option value="Supplier">Supplier</option>
                    <option value="Compliance">Compliance</option>
                    <option value="Security">Security</option>

                </select>


                <label>Risk Appetite</label>

                <select name="risk_appetite">

                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>

                </select>


                <label>Probability</label>

                <select name="probability">

                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>

                </select>


                <label>Impact</label>

                <select name="impact">

                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>

                </select>


                <label>Residual Probability</label>

                <select name="residual_probability">

                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>

                </select>


                <label>Residual Impact</label>

                <select name="residual_impact">

                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>

                </select>


                <label>Target Probability</label>

                <select name="target_probability">

                    <option value="Low" selected>Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>

                </select>


                <label>Target Impact</label>

                <select name="target_impact">

                    <option value="Low" selected>Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>

                </select>


                <label>Mitigation Plan</label>

                <textarea
                    name="mitigation"
                    rows="4"
                    required
                ></textarea>


                <label>Risk Owner</label>

                <input
                    type="text"
                    name="owner"
                    required
                >


                <label>Escalation Status</label>

                <select name="escalation_status">

                    <option value="Not Escalated">
                        Not Escalated
                    </option>

                    <option value="Escalated">
                        Escalated
                    </option>

                </select>


                <label>Escalation Owner</label>

                <input
                    type="text"
                    name="escalation_owner"
                >


                <label>Escalation Date</label>

                <input
                    type="date"
                    name="escalation_date"
                >


                <label>Status</label>

                <select name="status">

                    <option value="Open">Open</option>
                    <option value="Monitoring">Monitoring</option>
                    <option value="Mitigated">Mitigated</option>
                    <option value="Closed">Closed</option>

                </select>


                <button type="submit" class="btn-primary">
                    Save Risk
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
