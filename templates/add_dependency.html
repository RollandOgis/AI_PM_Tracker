<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Dependency</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <h2>AI PM</h2>
        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/calendar">Calendar</a>
        <a href="/gantt">Gantt Timeline</a>
        <a href="/analytics">Analytics</a>
        <a href="/clients">Clients</a>
        <a href="/team">Team Members</a>
        <a href="/ai-assistant">AI Assistant</a>
        <a href="/raid">RAID Log</a>
        <a href="/risks">Risk Register</a>
        <a href="/issues">Issue Register</a>
        <a href="/changes">Change Register</a>
        <a href="/benefits">Benefits Register</a>
        <a href="/activity">Activity</a>
        <a href="/advanced-search">Search</a>
        <a href="/add-task">Add Task</a>
        <a href="/add-project">Add Project</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="main-content">
        <div class="form-container">
            <h1>Add Dependency</h1>

            <form method="POST">
                <label>Project</label>
                <select name="project_id" required>
                    {% for project in projects %}
                        <option value="{{ project['id'] }}">{{ project['name'] }}</option>
                    {% endfor %}
                </select>

                <label>Dependency Title</label>
                <input type="text" name="title" required>

                <label>Description</label>
                <textarea name="description" rows="5"></textarea>

                <label>Owner</label>
                <input type="text" name="owner">

                <label>Target Date</label>
                <input type="date" name="target_date">

                <label>Status</label>
                <select name="status">
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Blocked">Blocked</option>
                </select>

                <button type="submit" class="btn-primary">
                    Save Dependency
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
