<!DOCTYPE html>
<html>
<head>

    <title>AI PM Copilot</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>
<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <h1>AI PM Copilot</h1>

        <div class="card">

            <h2>Portfolio Summary</h2>

            <p>{{ summary }}</p>

        </div>

        <div class="card">

            <h2>AI Recommendations</h2>

            <ul>

                {% for recommendation in recommendations %}

                <li>
                    {{ recommendation }}
                </li>

                {% endfor %}

            </ul>

        </div>

    </div>

</div>

</body>
</html>
