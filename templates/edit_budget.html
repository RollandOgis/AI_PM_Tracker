<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Budget</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Edit Budget</h1>

                <p class="dashboard-subtitle">
                    Update budget baselines, approvals, forecasts and financial governance records.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/budgets" class="btn-primary">
                    Back to Budgets
                </a>
            </div>

        </div>

        <div class="form-container">

            <form method="POST">

                <label>Project</label>
                <select name="project_id" required>
                    <option value="{{ budget['project_id'] }}">
                        Current Project
                    </option>

                    {% for project in projects %}
                        <option value="{{ project['id'] }}">
                            {{ project['name'] }}
                        </option>
                    {% endfor %}
                </select>

                <label>Budget Amount (£)</label>
                <input type="number" step="0.01" name="budget_amount" value="{{ budget['budget_amount'] }}" required>

                <label>Budget Baseline (£)</label>
                <input type="number" step="0.01" name="budget_baseline" value="{{ budget['budget_baseline'] or 0 }}">

                <label>Actual Cost (£)</label>
                <input type="number" step="0.01" name="actual_cost" value="{{ budget['actual_cost'] }}" required>

                <label>Forecast Cost (£)</label>
                <input type="number" step="0.01" name="forecast_cost" value="{{ budget['forecast_cost'] }}" required>

                <label>Baseline Forecast (£)</label>
                <input type="number" step="0.01" name="baseline_forecast" value="{{ budget['baseline_forecast'] or 0 }}">

                <label>Forecast Owner</label>
                <input type="text" name="forecast_owner" value="{{ budget['forecast_owner'] or '' }}">

                <label>Forecast Approver</label>
                <input type="text" name="forecast_approver" value="{{ budget['forecast_approver'] or '' }}">

                <label>Forecast Version</label>
                <input type="text" name="forecast_version" value="{{ budget['forecast_version'] or '' }}">

                <label>Forecast Confidence</label>
                <select name="forecast_confidence">
                    <option value="{{ budget['forecast_confidence'] or '' }}">
                        {{ budget['forecast_confidence'] or 'Select' }}
                    </option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>

                <label>Forecast Approval Status</label>
                <select name="forecast_approval_status">
                    <option value="{{ budget['forecast_approval_status'] or 'Draft' }}">
                        {{ budget['forecast_approval_status'] or 'Draft' }}
                    </option>
                    <option value="Draft">Draft</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>

                <label>Forecast Assumptions</label>
                <textarea name="forecast_assumptions" rows="4">{{ budget['forecast_assumptions'] or '' }}</textarea>

                <label>Budget Owner</label>
                <input type="text" name="budget_owner" value="{{ budget['budget_owner'] or '' }}">

                <label>Budget Approver</label>
                <input type="text" name="budget_approver" value="{{ budget['budget_approver'] or '' }}">

                <label>Approved By</label>
                <input type="text" name="approved_by" value="{{ budget['approved_by'] or '' }}">

                <label>Approval Date</label>
                <input type="date" name="approval_date" value="{{ budget['approval_date'] or '' }}">

                <label>Status</label>
                <select name="status">
                    <option value="{{ budget['status'] or 'Draft' }}">
                        {{ budget['status'] or 'Draft' }}
                    </option>
                    <option value="Draft">Draft</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                    <option value="In Review">In Review</option>
                </select>

                <label>Budget Category</label>
                <select name="budget_category">
                    <option value="{{ budget['budget_category'] or '' }}">
                        {{ budget['budget_category'] or 'Select' }}
                    </option>
                    <option value="Operational">Operational</option>
                    <option value="Project">Project</option>
                    <option value="Programme">Programme</option>
                    <option value="Portfolio">Portfolio</option>
                </select>

                <label>Funding Source</label>
                <input type="text" name="funding_source" value="{{ budget['funding_source'] or '' }}">

                <label>CAPEX / OPEX</label>
                <select name="capex_opex">
                    <option value="{{ budget['capex_opex'] or '' }}">
                        {{ budget['capex_opex'] or 'Select' }}
                    </option>
                    <option value="CAPEX">CAPEX</option>
                    <option value="OPEX">OPEX</option>
                </select>

                <label>Cost Centre</label>
                <input type="text" name="cost_centre" value="{{ budget['cost_centre'] or '' }}">

                <label>Programme Link</label>
                <input type="text" name="programme_link" value="{{ budget['programme_link'] or '' }}">

                <label>Portfolio Link</label>
                <input type="text" name="portfolio_link" value="{{ budget['portfolio_link'] or '' }}">

                <label>Budget Notes</label>
                <textarea name="budget_notes" rows="5">{{ budget['budget_notes'] or '' }}</textarea>

                <label>Change Note</label>
                <textarea name="change_note" rows="3" placeholder="Reason for this budget update"></textarea>

                <br><br>

                <button type="submit" class="btn-primary">
                    Update Budget
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
