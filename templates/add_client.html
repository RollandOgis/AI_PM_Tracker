<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Client</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>AI PM</h2>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/kanban">Kanban</a>
        <a href="/calendar">Calendar</a>
        <a href="/gantt">Gantt Timeline</a>
        <a href="/analytics">Analytics</a>
        <a href="/clients">Clients</a>
        <a href="/ai-assistant">AI Assistant</a>
        <a href="/risks">Risk Register</a>
        <a href="/issues">Issue Register</a>
        <a href="/changes">Change Register</a>
        <a href="/benefits">Benefits Register</a>
        <a href="/activity">Activity</a>
        <a href="/advanced-search">Search</a>
        <a href="/export-report">Export PDF</a>
        <a href="/logout">Logout</a>

    </div>

    <div class="main-content">

        <div class="form-container">

            <h1>Add Client</h1>

            <form method="POST">

                <label>Client Name</label>

                <input
                    type="text"
                    name="name"
                    required
                >


                <label>Company</label>

                <input
                    type="text"
                    name="company"
                >


                <label>Email</label>

                <input
                    type="email"
                    name="email"
                >


                <label>Phone</label>

                <input
                    type="text"
                    name="phone"
                >


                <label>Status</label>

                <select name="status">

                    <option value="Lead">
                        Lead
                    </option>

                    <option value="Active">
                        Active
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                </select>


                <label>Estimated Value (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="estimated_value"
                >


                <label>Notes</label>

                <textarea
                    name="notes"
                    rows="5"
                ></textarea>


                <button type="submit" class="btn-primary">
                    Add Client
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
