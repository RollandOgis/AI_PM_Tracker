<!DOCTYPE html>
<html>
<head>

    <title>AI Resource Optimisation</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>
<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <h1>AI Resource Optimisation</h1>

        <div class="card">

            <h2>Resource Recommendations</h2>

            <table>

                <tr>
                    <th>Team Member</th>
                    <th>Allocated Tasks</th>
                    <th>Recommendation</th>
                </tr>

                {% for member in recommendations %}

                <tr>

                    <td>{{ member.name }}</td>

                    <td>{{ member.task_count }}</td>

                    <td>{{ member.recommendation }}</td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</div>

</body>
</html>
