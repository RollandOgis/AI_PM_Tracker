<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Organisation</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Add Organisation</h1>

                <p class="dashboard-subtitle">
                    Create an organisation account and subscription profile.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/organisations" class="btn-primary">
                    Back to Organisations
                </a>
            </div>

        </div>

        <div class="smart-card">

            <form method="POST">

                <label>Organisation Name</label>
                <input
                    type="text"
                    name="organisation_name"
                    required
                >

                <label>Industry</label>
                <input
                    type="text"
                    name="industry"
                >

                <label>Plan</label>
                <select name="plan" required>
                    <option value="Trial">Trial</option>
                    <option value="Free">Free</option>
                    <option value="Pro">Pro</option>
                    <option value="Enterprise">Enterprise</option>
                </select>

                <label>Account Status</label>
                <select name="account_status" required>
                    <option value="Active">Active</option>
                    <option value="Suspended">Suspended</option>
                </select>

                <label>Subscription Status</label>
                <select name="subscription_status" required>
                    <option value="Trial">Trial</option>
                    <option value="Paid">Paid</option>
                    <option value="Expired">Expired</option>
                </select>

                <label>Organisation Owner</label>
                <input
                    type="text"
                    name="organisation_owner"
                >

                <label>Contact Email</label>
                <input
                    type="email"
                    name="contact_email"
                >

                <label>Organisation Size</label>
                <select name="organisation_size">
                    <option value="">Select Size</option>
                    <option value="1-10">1-10</option>
                    <option value="11-50">11-50</option>
                    <option value="51-250">51-250</option>
                    <option value="251-1000">251-1000</option>
                    <option value="1000+">1000+</option>
                </select>

                <label>Region</label>
                <input
                    type="text"
                    name="region"
                    placeholder="UK, Europe, North America..."
                >

                <br><br>

                <button
                    type="submit"
                    class="btn-primary"
                >
                    Save Organisation
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
