<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Budget</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Add Budget</h1>

                <p class="dashboard-subtitle">
                    Create budget baselines, approvals, funding sources and financial governance records.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/budgets" class="btn-primary">
                    Back to Budgets
                </a>
            </div>

        </div>

        <div class="form-container">

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}
                        <option value="{{ project['id'] }}">
                            {{ project['name'] }}
                        </option>
                    {% endfor %}

                </select>

                <label>Budget Amount (£)</label>
                <input
                    type="number"
                    step="0.01"
                    name="budget_amount"
                    required
                >

                <label>Budget Baseline (£)</label>
                <input
                    type="number"
                    step="0.01"
                    name="budget_baseline"
                    value="0"
                >

                <label>Actual Cost (£)</label>
                <input
                    type="number"
                    step="0.01"
                    name="actual_cost"
                    value="0"
                    required
                >

                <label>Forecast Cost (£)</label>
                <input
                    type="number"
                    step="0.01"
                    name="forecast_cost"
                    value="0"
                    required
                >

                <label>Budget Owner</label>
                <input
                    type="text"
                    name="budget_owner"
                >

                <label>Budget Approver</label>
                <input
                    type="text"
                    name="budget_approver"
                >

                <label>Approved By</label>
                <input
                    type="text"
                    name="approved_by"
                >

                <label>Approval Date</label>
                <input
                    type="date"
                    name="approval_date"
                >

                <label>Baseline Forecast (£)</label>
<input
    type="number"
    step="0.01"
    name="baseline_forecast"
    value="0"
>

<label>Forecast Owner</label>
<input
    type="text"
    name="forecast_owner"
>

<label>Forecast Approver</label>
<input
    type="text"
    name="forecast_approver"
>

<label>Forecast Version</label>
<input
    type="text"
    name="forecast_version"
    placeholder="v1.0"
>

<label>Forecast Confidence</label>
<select name="forecast_confidence">
    <option value="">Select</option>
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
</select>

<label>Forecast Approval Status</label>
<select name="forecast_approval_status">
    <option value="Draft">Draft</option>
    <option value="Pending">Pending</option>
    <option value="Approved">Approved</option>
    <option value="Rejected">Rejected</option>
</select>

<label>Forecast Assumptions</label>
<textarea
    name="forecast_assumptions"
    rows="4"
></textarea>

                <label>Status</label>

                <select name="status">

                    <option value="Draft">Draft</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                    <option value="In Review">In Review</option>

                </select>

                <label>Budget Category</label>

                <select name="budget_category">

                    <option value="">Select</option>
                    <option value="Operational">Operational</option>
                    <option value="Project">Project</option>
                    <option value="Programme">Programme</option>
                    <option value="Portfolio">Portfolio</option>

                </select>

                <label>Funding Source</label>

                <input
                    type="text"
                    name="funding_source"
                >

                <label>CAPEX / OPEX</label>

                <select name="capex_opex">

                    <option value="">Select</option>
                    <option value="CAPEX">CAPEX</option>
                    <option value="OPEX">OPEX</option>

                </select>

                <label>Cost Centre</label>

                <input
                    type="text"
                    name="cost_centre"
                >

                <label>Programme Link</label>

                <input
                    type="text"
                    name="programme_link"
                >

                <label>Portfolio Link</label>

                <input
                    type="text"
                    name="portfolio_link"
                >

                <label>Budget Notes</label>

                <textarea
                    name="budget_notes"
                    rows="5"
                ></textarea>

                <br><br>

                <button
                    type="submit"
                    class="btn-primary"
                >
                    Save Budget
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
