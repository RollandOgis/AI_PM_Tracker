<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Permission</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Edit Permission</h1>

                <p class="dashboard-subtitle">
                    Update permission controls and access policies.
                </p>
            </div>

        </div>

        <div class="smart-card">

            <form method="POST">

                <label>Role</label>
                <input
                    type="text"
                    name="role"
                    value="{{ permission['role'] }}"
                    required
                >

                <label>Module</label>
                <input
                    type="text"
                    name="module"
                    value="{{ permission['module'] }}"
                    required
                >

                <label>Permission Category</label>
                <input
                    type="text"
                    name="permission_category"
                    value="{{ permission['permission_category'] or '' }}"
                >

                <label>Permission Template</label>
                <input
                    type="text"
                    name="permission_template"
                    value="{{ permission['permission_template'] or '' }}"
                >

                <label>Inherits From</label>
                <input
                    type="text"
                    name="inherits_from"
                    value="{{ permission['inherits_from'] or '' }}"
                >

                <label>Risk Level</label>

                <select name="risk_level">

                    <option value="Low"
                    {% if permission['risk_level'] == 'Low' %}
                    selected
                    {% endif %}
                    >
                        Low
                    </option>

                    <option value="Medium"
                    {% if permission['risk_level'] == 'Medium' %}
                    selected
                    {% endif %}
                    >
                        Medium
                    </option>

                    <option value="High"
                    {% if permission['risk_level'] == 'High' %}
                    selected
                    {% endif %}
                    >
                        High
                    </option>

                </select>

                <label>Last Reviewed Date</label>
                <input
                    type="date"
                    name="last_reviewed_date"
                    value="{{ permission['last_reviewed_date'] or '' }}"
                >

                <label>Permission Notes</label>

                <textarea
                    name="permission_notes"
                    rows="4"
                >{{ permission['permission_notes'] or '' }}</textarea>

                <div class="smart-insight">

                    <label>
                        <input
                            type="checkbox"
                            name="can_view"
                            {% if permission['can_view'] %}checked{% endif %}
                        >
                        Can View
                    </label>

                    <br><br>

                    <label>
                        <input
                            type="checkbox"
                            name="can_create"
                            {% if permission['can_create'] %}checked{% endif %}
                        >
                        Can Create
                    </label>

                    <br><br>

                    <label>
                        <input
                            type="checkbox"
                            name="can_edit"
                            {% if permission['can_edit'] %}checked{% endif %}
                        >
                        Can Edit
                    </label>

                    <br><br>

                    <label>
                        <input
                            type="checkbox"
                            name="can_delete"
                            {% if permission['can_delete'] %}checked{% endif %}
                        >
                        Can Delete
                    </label>

                </div>

                <br>

                <button
                    type="submit"
                    class="btn-primary"
                >
                    Update Permission
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
