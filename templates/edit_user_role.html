<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User Role</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">

            <div>
                <h1>Edit User Role</h1>

                <p class="dashboard-subtitle">
                    Update role assignment, hierarchy, ownership and template information.
                </p>
            </div>

            <div class="dashboard-actions">
                <a href="/user-roles" class="btn-primary">
                    Back to Roles
                </a>
            </div>

        </div>

        <div class="smart-card">

            <form method="POST">

                <label>User</label>
                <select name="user_id" required>

                    {% for user in users %}

                        <option
                            value="{{ user['id'] }}"
                            {% if user['id'] == role['user_id'] %}
                            selected
                            {% endif %}
                        >
                            {{ user['username'] }} - {{ user['email'] or 'No email' }}
                        </option>

                    {% endfor %}

                </select>

                <label>Role</label>
                <select name="role" required>

                    <option value="Admin"
                        {% if role['role'] == 'Admin' %}selected{% endif %}
                    >
                        Admin
                    </option>

                    <option value="Project Manager"
                        {% if role['role'] == 'Project Manager' %}selected{% endif %}
                    >
                        Project Manager
                    </option>

                    <option value="Project Coordinator"
                        {% if role['role'] == 'Project Coordinator' %}selected{% endif %}
                    >
                        Project Coordinator
                    </option>

                    <option value="Viewer"
                        {% if role['role'] == 'Viewer' %}selected{% endif %}
                    >
                        Viewer
                    </option>

                </select>

                <label>Role Description</label>
                <textarea
                    name="role_description"
                    rows="4"
                >{{ role['role_description'] or '' }}</textarea>

                <label>Parent Role</label>
                <input
                    type="text"
                    name="parent_role"
                    value="{{ role['parent_role'] or '' }}"
                >

                <label>Role Owner</label>
                <input
                    type="text"
                    name="role_owner"
                    value="{{ role['role_owner'] or '' }}"
                >

                <label>Role Template</label>
                <input
                    type="text"
                    name="role_template"
                    value="{{ role['role_template'] or '' }}"
                >

                <label>Custom Role</label>
                <select name="custom_role">

                    <option value="No"
                        {% if not role['custom_role'] %}
                        selected
                        {% endif %}
                    >
                        No
                    </option>

                    <option value="Yes"
                        {% if role['custom_role'] %}
                        selected
                        {% endif %}
                    >
                        Yes
                    </option>

                </select>

                <br><br>

                <button type="submit" class="btn-primary">
                    Update Role
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
