<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="sidebar">

        <h1>AI PM</h1>

        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
        <a href="/add-task">Add Task</a>
        <a href="/add-project">Add Project</a>
        <a href="/logout">Logout</a>

    </div>

    <div class="main-content">

        <div class="form-card">

            <h2>Add New Task</h2>

            <form method="POST">

                <label>Task Title</label>

                <input
                    type="text"
                    name="title"
                    required
                >

                <label>Priority</label>

                <select name="priority">

                    <option value="Low">
                        Low
                    </option>

                    <option value="Medium">
                        Medium
                    </option>

                    <option value="High">
                        High
                    </option>

                </select>

                <label>Status</label>

                <select name="status">

                    <option value="Pending">
                        Pending
                    </option>

                    <option value="In Progress">
                        In Progress
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                    <option value="Blocked">
                        Blocked
                    </option>

                </select>

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                >

                <label>Select Project</label>

                <select name="project_id">

                    {% for project in projects %}

                    <option value="{{ project[0] }}">
                        {{ project[1] }}
                    </option>

                    {% endfor %}

                </select>

                <button type="submit">
                    Add Task
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
