<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="form-container">

            <h1>Add Task</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id" required>

                    {% for project in projects %}

                        <option value="{{ project['id'] }}">
                            {{ project['name'] }}
                        </option>

                    {% endfor %}

                </select>

                <label>Task Title</label>

                <input
                    type="text"
                    name="title"
                    required
                >

                <label>Description</label>

                <textarea
                    name="description"
                    rows="5"
                ></textarea>

                <label>Assigned To</label>

                <input
                    type="text"
                    name="assigned_to"
                    placeholder="Optional manual assignment"
                >

                <label>Team Members</label>

                <select name="team_member_ids" multiple>

                    {% for member in team_members %}

                        <option value="{{ member['id'] }}">

                            {{ member['name'] }}

                            {% if member['role'] %}
                                - {{ member['role'] }}
                            {% endif %}

                        </option>

                    {% endfor %}

                </select>

                <small>
                    Hold Ctrl on Windows or Command on Mac to select multiple team members.
                </small>

                <label>Task Dependencies</label>

                <select name="depends_on_task_ids" multiple>

                    {% for task in existing_tasks %}

                        <option value="{{ task['id'] }}">

                            {{ task['title'] }}
                            ({{ task['project_name'] }})

                        </option>

                    {% endfor %}

                </select>

                <small>
                    Select tasks that must be completed before this task.
                </small>

                <label>Priority</label>

                <select name="priority">

                    <option value="Low">
                        Low
                    </option>

                    <option value="Medium">
                        Medium
                    </option>

                    <option value="High">
                        High
                    </option>

                </select>

                <label>Status</label>

                <select name="status">

                    <option value="Pending">
                        Pending
                    </option>

                    <option value="In Progress">
                        In Progress
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                    <option value="Blocked">
                        Blocked
                    </option>

                </select>

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                >

                <label>Estimated Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="estimated_hours"
                >

                <label>Actual Hours</label>

                <input
                    type="number"
                    step="0.1"
                    name="actual_hours"
                >

                <label>Hourly Rate (£)</label>

                <input
                    type="number"
                    step="0.01"
                    name="hourly_rate"
                >

                <label>Attachment Name</label>

                <input
                    type="text"
                    name="attachment_name"
                    placeholder="Requirements Document"
                >

                <label>Attachment URL</label>

                <input
                    type="text"
                    name="attachment_url"
                    placeholder="https://..."
                >

                <label>Acceptance Criteria</label>

                <textarea
                    name="acceptance_criteria"
                    rows="4"
                    placeholder="What must be true before this task is complete?"
                ></textarea>

                <label>Checklist</label>

                <textarea
                    name="checklist"
                    rows="4"
                    placeholder="Example:
- Build API
- Complete Testing
- Obtain Approval"
                ></textarea>

                <label>

                    <input
                        type="checkbox"
                        name="is_recurring"
                    >

                    Recurring Task

                </label>

                <label>Recurring Frequency</label>

                <select name="recurring_frequency">

                    <option value="">
                        Not Recurring
                    </option>

                    <option value="Daily">
                        Daily
                    </option>

                    <option value="Weekly">
                        Weekly
                    </option>

                    <option value="Monthly">
                        Monthly
                    </option>

                    <option value="Quarterly">
                        Quarterly
                    </option>

                </select>

                <button type="submit" class="btn-primary">
                    Create Task
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
