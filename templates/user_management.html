<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <main class="main-content">

        <h1>User Management</h1>

        <p class="page-subtitle">
            Manage platform users and account access.
        </p>

        <div class="card">

            <div class="table-container">

                <table>

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Avatar</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for user in users %}

                        <tr>

                            <td>
                                {{ user.id }}
                            </td>

                            <td>
                                {{ user.username }}
                            </td>

                            <td>
                                {{ user.email or "" }}
                            </td>

                            <td>
                                {{ user.avatar_initials }}
                            </td>

                            <td>

                                <a
                                    href="/edit-user/{{ user.id }}"
                                    class="btn-primary"
                                >
                                    Edit
                                </a>

                                <a
                                    href="/admin-reset-password/{{ user.id }}"
                                    class="btn-warning"
                                >
                                    Reset Password
                                </a>

                                <a
                                    href="/delete-user/{{ user.id }}"
                                    class="btn-danger"
                                    onclick="return confirm('Delete this user?')"
                                >
                                    Delete
                                </a>

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

</body>
</html>
