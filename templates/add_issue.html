<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Issue</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include 'sidebar.html' %}

    <div class="main-content">

        <div class="form-container">

            <h1>Add Issue</h1>

            <form method="POST">

                <label>Project</label>

                <select name="project_id">

                    {% for project in projects %}

                        <option value="{{ project['id'] }}">
                            {{ project['name'] }}
                        </option>

                    {% endfor %}

                </select>


                <label>Issue Title</label>

                <input
                    type="text"
                    name="title"
                    required
                >


                <label>Description</label>

                <textarea
                    name="description"
                    rows="4"
                    required
                ></textarea>


                <label>Issue Category</label>

                <select name="issue_category">

                    <option value="Delivery">Delivery</option>
                    <option value="Technical">Technical</option>
                    <option value="Financial">Financial</option>
                    <option value="Supplier">Supplier</option>
                    <option value="Resource">Resource</option>
                    <option value="Compliance">Compliance</option>

                </select>


                <label>Priority</label>

                <select name="priority">

                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>

                </select>


                <label>Issue Owner</label>

                <input
                    type="text"
                    name="owner"
                    required
                >


                <label>SLA Target Date</label>

                <input
                    type="date"
                    name="sla_target_date"
                >


                <label>Escalation Status</label>

                <select name="escalation_status">

                    <option value="Not Escalated">
                        Not Escalated
                    </option>

                    <option value="Escalated">
                        Escalated
                    </option>

                </select>


                <label>Escalation Owner</label>

                <input
                    type="text"
                    name="escalation_owner"
                >


                <label>Escalation Date</label>

                <input
                    type="date"
                    name="escalation_date"
                >


                <label>Status</label>

                <select name="status">

                    <option value="Open">Open</option>
                    <option value="Investigating">Investigating</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Closed">Closed</option>

                </select>


                <label>Root Cause Analysis</label>

                <textarea
                    name="root_cause"
                    rows="4"
                ></textarea>


                <label>Resolution Plan</label>

                <textarea
                    name="resolution"
                    rows="4"
                    required
                ></textarea>


                <label>Closure Validation</label>

                <textarea
                    name="closure_validation"
                    rows="4"
                ></textarea>


                <button type="submit" class="btn-primary">
                    Save Issue
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
