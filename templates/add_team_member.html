<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Team Member</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">
     {% include "sidebar.html" %}


    <div class="main-content">

        <div class="form-container">

            <h1>Add Team Member</h1>

            <form method="POST">

                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    required
                >


                <label>Role</label>

                <input
                    type="text"
                    name="role"
                    placeholder="Developer, BA, PM, QA"
                >


                <label>Email</label>

                <input
                    type="email"
                    name="email"
                >


                <label>Phone</label>

                <input
                    type="text"
                    name="phone"
                >


                <label>Skills</label>

                <textarea
                    name="skills"
                    rows="4"
                    placeholder="Python, React, SQL, Testing, Stakeholder Management"
                ></textarea>


                <label>Status</label>

                <select name="status">

                    <option value="Active">
                        Active
                    </option>

                    <option value="Unavailable">
                        Unavailable
                    </option>

                    <option value="Inactive">
                        Inactive
                    </option>

                </select>


                <button type="submit" class="btn-primary">
                    Save Team Member
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
