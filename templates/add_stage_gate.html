<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stage Gate</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    {% include "sidebar.html" %}

    <div class="main-content">

        <div class="dashboard-header">
            <div>
                <h1>Add Stage Gate</h1>
                <p class="dashboard-subtitle">
                    Add a formal project governance review gate.
                </p>
            </div>
        </div>

        <div class="form-container">

            <form method="POST">

                <label>Project</label>
                <select name="project_id" required>
                    {% for project in projects %}
                        <option value="{{ project['id'] }}">
                            {{ project['name'] }}
                        </option>
                    {% endfor %}
                </select>

                <label>Stage Name</label>
                <select name="stage_name" required>
                    <option value="Initiation Gate">Initiation Gate</option>
                    <option value="Planning Gate">Planning Gate</option>
                    <option value="Execution Gate">Execution Gate</option>
                    <option value="Testing Gate">Testing Gate</option>
                    <option value="Closure Gate">Closure Gate</option>
                </select>

                <label>Status</label>
                <select name="status">
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Deferred">Deferred</option>
                </select>

                <label>Reviewer</label>
                <input type="text" name="reviewer">

                <label>Review Date</label>
                <input type="date" name="review_date">

                <label>Comments</label>
                <textarea name="comments" rows="5"></textarea>

                <button type="submit" class="btn-primary">
                    Save Stage Gate
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
